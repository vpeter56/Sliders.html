<!DOCTYPE html>
<html lang="en">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--brightness:1;--contrast:1;}
html,body{min-height:100dvh;background:#1c1c1e;color:#f5f5f5;transition:background 0.25s;overscroll-behavior-y:none;}
#root{}
textarea,input{outline:none;-webkit-appearance:none;appearance:none;}
button{-webkit-appearance:none;appearance:none;touch-action:manipulation;cursor:pointer;}
input[type="text"],input[type="color"],textarea{font-size:16px!important;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{border-radius:2px;background:#444;}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes floatIn{from{opacity:0;transform:rotate(-1.5deg) scale(0.9)}to{opacity:1;transform:rotate(-1.5deg) scale(1.04)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.15s ease;backdrop-filter:blur(4px);}
.modal-sheet{width:100%;max-width:520px;animation:fadeUp 0.22s ease;}
@media(min-width:600px){.main-wrap{max-width:600px!important;}.modal-overlay{align-items:center;}.modal-sheet{border-radius:16px!important;max-width:460px;}}
@media(min-width:900px){.main-wrap{max-width:720px!important;}}
.sticky-header{position:sticky;top:0;left:0;width:100%;z-index:20;}
</style>
</head>
<body style="background:#1c1c1e">
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback,useReducer}=React;

const KEY="sliders_data";
(function migrateOldData(){
  const OLD_KEYS=["sliders_v5","sliders_v4","sliders_v3","sliders_v2","sliders_v1"];
  try{
    if(localStorage.getItem(KEY)) return;
    for(const old of OLD_KEYS){const d=localStorage.getItem(old);if(d){localStorage.setItem(KEY,d);break;}}
  }catch{}
})();
const PALETTE=["#FF6B2B","#FFB347","#4ECDC4","#A8E6CF","#FF8B94","#C9B1FF","#85C1E9","#F8D56B","#B5EAD7","#FF9AA2","#F06292","#81C784","#64B5F6","#FFD54F","#A1887F","#90A4AE"];
const STEPS=[{l:"5m",m:5},{l:"10m",m:10},{l:"15m",m:15},{l:"30m",m:30}];
const DARK={bg:"#1c1c1e",bgCard:"#2a2a2e",bgInput:"#323236",bgSlider:"#484850",border:"#505058",borderMid:"#626268",text:"#ffffff",textSub:"#e8e8e8",textMuted:"#c0c0c0",textDim:"#a0a0a0",textFaint:"#888890",donutFree:"#3a3a3e",tc:"#1c1c1e"};
const LIGHT={bg:"#f4f3ef",bgCard:"#eceae4",bgInput:"#e4e2db",bgSlider:"#d8d6cf",border:"#cac8c1",borderMid:"#bbb9b2",text:"#1a1a1a",textSub:"#2e2e2e",textMuted:"#555",textDim:"#777",textFaint:"#999",donutFree:"#d8d6cf",tc:"#f4f3ef"};

const DEF_TASKS=[
  {id:1,name:"Sleep",hours:8,originalHours:8,color:PALETTE[0],locked:false,actual:0},
  {id:2,name:"Work",hours:6,originalHours:6,color:PALETTE[1],locked:false,actual:0},
  {id:3,name:"Exercise",hours:1,originalHours:1,color:PALETTE[2],locked:false,actual:0},
];

// ── helpers ───────────────────────────────────────────────────────────────────
function hm(h){
  const m=Math.round(h*60),H=Math.floor(m/60),M=m%60;
  if(H===0)return`${M}m`;if(M===0)return`${H}h`;return`${H}h ${M}m`;
}
function snap(h,s){return Math.round(h*60/s)*s/60;}
function rds(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):null;}catch{return null;}}
function wrs(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch{}}

// ── Shrink-only scaling ───────────────────────────────────────────────────────
// When the day window shrinks below the sum of task hours, compress tasks
// proportionally to fit. When the window is larger than the sum, do nothing —
// the slack shows as unallocated in the donut/timeline.
function scaleTasksToTotal(tasks, targetTotal) {
  if(tasks.length === 0) return tasks;
  const currentSum = tasks.reduce((s,t)=>s+(t.hours||0), 0);
  // Window fits all tasks — leave them alone
  if(targetTotal >= currentSum - 0.001) return tasks;
  if(currentSum <= 0) return tasks;
  // Window too small — shrink proportionally
  const targetMin = Math.round(targetTotal * 60);
  let assigned = 0;
  const newMins = tasks.map((t,i) => {
    if(i === tasks.length-1) return Math.max(0, targetMin - assigned);
    const m = Math.round((t.hours||0) / currentSum * targetMin);
    assigned += m;
    return m;
  });
  return tasks.map((t,i)=>({...t, hours: Math.max(0, newMins[i]/60)}));
}

function parseMD(text){
  const tasks=[];
  let dayStart=null,dayEnd=null;
  for(const line of text.split("\n")){
    const day=line.match(/^> Day: (\d+(?:\.\d+)?):(\d+) → (\d+(?:\.\d+)?):(\d+)/);
    if(day){
      dayStart=parseInt(day[1])+(day[2]==="30"?0.5:0);
      dayEnd=parseInt(day[3])+(day[4]==="30"?0.5:0);
    }
    const m=line.match(/^## (.+?) \[(\d+(?:\.\d+)?)h\] (#[0-9a-fA-F]{6})?/);
    if(m) tasks.push({
      id:Date.now()+Math.random(),
      name:m[1].trim(),
      hours:parseFloat(m[2]),
      originalHours:parseFloat(m[2]),
      color:m[3]||PALETTE[tasks.length%PALETTE.length],
      locked:false,actual:0
    });
  }
  return {tasks,dayStart,dayEnd};
}
function serializeMD(tasks, dayStart=0, dayEnd=24){
  const dayLen=dayEnd-dayStart;
  const total=tasks.reduce((s,t)=>s+t.hours,0),unalloc=Math.max(0,dayLen-total);
  let out=`# Sliders — Daily Time Allocation\n\n`;
  out+=`> Day: ${String(dayStart).padStart(2,'0')}:00 → ${String(dayEnd).padStart(2,'0')}:00 (${hm(dayLen)})\n`;
  out+=`> Total: ${hm(total)} / ${hm(dayLen)} | Unallocated: ${hm(unalloc)}\n\n---\n\n`;
  for(const t of tasks) out+=`## ${t.name} [${t.hours.toFixed(4)}h] ${t.color}\n- Planned: ${hm(t.hours)} (${dayLen>0?((t.hours/dayLen)*100).toFixed(1):"—"}%)\n- Actual: ${hm(t.actual||0)}\n\n`;
  return out+`---\n_Generated by Sliders App_\n`;
}

// ── State ─────────────────────────────────────────────────────────────────────
function initState(){
  const s=rds();
  return {
    tasks:   s?.tasks   ?? DEF_TASKS,
    favs:    s?.favs    ?? [],
    step:    s?.step    ?? 15,
    dark:    s?.dark    ?? true,
    showTL:  s?.showTL  ?? false,
    dayStart:s?.dayStart?? 0,
    dayEnd:  s?.dayEnd  ?? 24,
  };
}

function reducer(state,action){
  const dayLen = state.dayEnd - state.dayStart;
  switch(action.type){

    case 'ADD_TASK':{
      const {name,color,hours}=action;
      const fav=state.favs.find(f=>f.name.toLowerCase()===name.toLowerCase());
      const total=state.tasks.reduce((s,t)=>s+t.hours,0);
      const rem=Math.max(0,dayLen-total);
      const rawH=hours!==undefined?hours:fav?fav.hours:snap(Math.min(state.step/60,rem),state.step);
      const h=Math.max(0,Math.min(rawH,rem||state.step/60));
      const c=color||fav?.color||PALETTE[state.tasks.length%PALETTE.length];
      return {...state,tasks:[...state.tasks,{id:Date.now(),name,hours:h,originalHours:h,color:c,locked:false,actual:0}]};
    }

    case 'UPD_TASK':{
      const tasks=state.tasks.map(t=>{
        if(t.id!==action.id) return t;
        const updated={...t,...action.patch};
        // When user manually moves a slider, update originalHours too
        if(action.patch.hours!==undefined) updated.originalHours=action.patch.hours;
        return updated;
      });
      let favs=state.favs;
      if(action.patch.hours!==undefined||action.patch.color!==undefined){
        const t=state.tasks.find(t=>t.id===action.id);
        if(t&&state.favs.some(f=>f.name.toLowerCase()===t.name.toLowerCase())){
          favs=state.favs.map(f=>f.name.toLowerCase()===t.name.toLowerCase()
            ?{...f,...(action.patch.hours!==undefined&&{hours:action.patch.hours}),...(action.patch.color!==undefined&&{color:action.patch.color})}
            :f);
        }
      }
      return {...state,tasks,favs};
    }

    case 'DEL_TASK':
      return {...state,tasks:state.tasks.filter(t=>t.id!==action.id)};

    case 'SET_TASKS':
      return {...state,tasks:action.tasks};

    case 'ADD_FAV':{
      const t=action.task;
      if(state.favs.some(f=>f.name.toLowerCase()===t.name.toLowerCase())) return state;
      return {...state,favs:[...state.favs,{name:t.name,hours:t.hours,color:t.color}]};
    }

    case 'DEL_FAV':
      return {...state,favs:state.favs.filter(f=>f.name.toLowerCase()!==action.name.toLowerCase())};

    case 'DISTRIBUTE':{
      const unlocked=state.tasks.filter(t=>!t.locked);
      if(!unlocked.length) return state;
      const lockedH=state.tasks.filter(t=>t.locked).reduce((s,t)=>s+t.hours,0);
      const each=snap((dayLen-lockedH)/unlocked.length,state.step);
      return {...state,tasks:state.tasks.map(t=>t.locked?t:{...t,hours:each,originalHours:each})};
    }

    case 'SET_DAY_WINDOW':{
      const {start,end}=action;
      const newLen=end-start;
      if(newLen<=0) return state;
      const oldLen = state.dayEnd - state.dayStart;
      // If window grew, restore each task to its originalHours first, then
      // shrink-only logic handles the case where restored sum still exceeds newLen.
      const restored = newLen > oldLen
        ? state.tasks.map(t=>({...t, hours: t.originalHours ?? t.hours}))
        : state.tasks;
      const scaled=scaleTasksToTotal(restored, newLen);
      return {...state,dayStart:start,dayEnd:end,tasks:scaled};
    }

    case 'SET_DAY_START':{
      const {start}=action;
      if(start>=state.dayEnd) return state;
      const newLen=state.dayEnd-start;
      const scaled=scaleTasksToTotal(state.tasks,newLen);
      return {...state,dayStart:start,tasks:scaled};
    }

    case 'REORDER_TASKS':{
      const {from,to}=action;
      const tasks=[...state.tasks];
      const [moved]=tasks.splice(from,1);
      tasks.splice(to,0,moved);
      return {...state,tasks};
    }
    case 'SET_STEP':    return {...state,step:action.step};
    case 'SET_DARK':    return {...state,dark:action.dark};
    case 'SET_SHOW_TL': return {...state,showTL:action.v};

    default: return state;
  }
}

// ── Circular Day Window Slider ────────────────────────────────────────────────
// Wraps around the donut. Two handles: start (green) and end (orange).
// Hours 0-24 mapped to 0-360 degrees, starting from top (-90deg).
function CircularDaySlider({dayStart, dayEnd, T, onChange}) {
  const SIZE = 220;   // SVG canvas size — extra room for clock labels
  const CX = 110, CY = 110;
  const R_TRACK = 88; // radius of the ring track
  const R_THUMB = 9;  // radius of drag handles
  const STROKE = 10;  // track stroke width

  const svgRef = useRef();
  const dragging = useRef(null); // 'start' | 'end' | null

  // Convert hour (0-24) to angle in radians, 0h = top = -PI/2
  const hourToAngle = h => (h / 24) * 2 * Math.PI - Math.PI / 2;

  // Convert angle (rad) to hour (0-24), snapped to 0.5h
  const angleToHour = a => {
    let deg = ((a + Math.PI / 2) / (2 * Math.PI) * 24 + 24) % 24;
    return Math.round(deg * 2) / 2; // 30-min snap
  };

  const aStart = hourToAngle(dayStart);
  const aEnd   = hourToAngle(dayEnd);

  // Arc path from aStart to aEnd (the active window)
  const arcPath = (a1, a2) => {
    // Ensure arc goes clockwise from a1 to a2
    let da = ((a2 - a1) + 2*Math.PI) % (2*Math.PI);
    if(da === 0) da = 2*Math.PI; // full circle
    const large = da > Math.PI ? 1 : 0;
    const x1 = CX + R_TRACK * Math.cos(a1);
    const y1 = CY + R_TRACK * Math.sin(a1);
    const x2 = CX + R_TRACK * Math.cos(a2);
    const y2 = CY + R_TRACK * Math.sin(a2);
    return `M ${x1} ${y1} A ${R_TRACK} ${R_TRACK} 0 ${large} 1 ${x2} ${y2}`;
  };

  const thumbPos = (a) => ({
    x: CX + R_TRACK * Math.cos(a),
    y: CY + R_TRACK * Math.sin(a),
  });
  const tStart = thumbPos(aStart);
  const tEnd   = thumbPos(aEnd);

  const getAngleFromEvent = (e) => {
    const rect = svgRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const x = (clientX - rect.left) / rect.width * SIZE - CX;
    const y = (clientY - rect.top) / rect.height * SIZE - CY;
    return Math.atan2(y, x);
  };

  const onPointerDown = (which) => (e) => {
    e.preventDefault();
    e.stopPropagation();
    dragging.current = which;
    svgRef.current.setPointerCapture(e.pointerId);
  };

  const onPointerMove = (e) => {
    if(!dragging.current) return;
    const a = getAngleFromEvent(e);
    const h = angleToHour(a);
    if(dragging.current === 'start') {
      const clamped = Math.max(0, Math.min(h, dayEnd - 0.5));
      onChange(clamped, dayEnd);
    } else {
      const clamped = Math.max(dayStart + 0.5, Math.min(h, 24));
      onChange(dayStart, clamped);
    }
  };

  const onPointerUp = () => { dragging.current = null; };

  const dayLen = dayEnd - dayStart;
  const textColor = T.text;
  const trackBg = T.bgSlider;
  // Arc brightness: more hours selected → more vivid orange; less → faded
  const dayLenRatio = Math.max(0, Math.min(1, dayLen / 24)); // 0..1
  const arcOpacity = 0.2 + 0.8 * dayLenRatio;
  const arcColor = "#FF6B2B";
  const startColor = "#4ECDC4";
  const endColor = "#FF6B2B";

  // Full circle background track
  const fullCircle = `M ${CX} ${CY-R_TRACK} A ${R_TRACK} ${R_TRACK} 0 1 1 ${CX-0.001} ${CY-R_TRACK}`;


  return (
    <div style={{position:"relative",width:SIZE,height:SIZE,flexShrink:0}}>
    <svg
      ref={svgRef}
      width={SIZE} height={SIZE}
      style={{display:"block",touchAction:"none",userSelect:"none",overflow:"visible"}}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
    >
      {/* Background full ring */}
      <path d={fullCircle} fill="none" stroke={trackBg} strokeWidth={STROKE} strokeLinecap="round"/>

      {/* Active arc */}
      <path d={arcPath(aStart, aEnd)} fill="none" stroke={arcColor} strokeWidth={STROKE} strokeLinecap="round" opacity={arcOpacity} style={{transition:"opacity 0.3s"}}/>

      {/* Center text */}
      <text x={CX} y={CY-8} textAnchor="middle" fill={textColor} fontSize={13} fontFamily="'Space Mono',monospace" fontWeight="bold">{hm(dayLen)}</text>
      <text x={CX} y={CY+8} textAnchor="middle" fill={T.textMuted} fontSize={9} fontFamily="'Space Mono',monospace">{`${String(Math.floor(dayStart)).padStart(2,'0')}:${dayStart%1?'30':'00'}`}–{`${String(Math.floor(dayEnd)).padStart(2,'0')}:${dayEnd%1?'30':'00'}`}</text>

      {/* Start handle (teal) */}
      <circle
        cx={tStart.x} cy={tStart.y} r={R_THUMB+4}
        fill="transparent"
        style={{cursor:"grab"}}
        onPointerDown={onPointerDown('start')}
      />
      <circle cx={tStart.x} cy={tStart.y} r={R_THUMB} fill={startColor} stroke={T.bg} strokeWidth={2}
        style={{cursor:"grab",filter:`drop-shadow(0 0 4px ${startColor}88)`}}
        onPointerDown={onPointerDown('start')}
      />


      {/* Start time label — floats outside the ring near handle */}
      {(()=>{
        const labelR = R_TRACK + 22;
        const lx = CX + labelR * Math.cos(aStart);
        const ly = CY + labelR * Math.sin(aStart);
        const anchor = lx < CX - 10 ? "end" : lx > CX + 10 ? "start" : "middle";
        const startLabel = `${String(Math.floor(dayStart)).padStart(2,'0')}:${dayStart%1?'30':'00'}`;
        return <text x={lx} y={ly+4} textAnchor={anchor} fill={startColor} fontSize={9} fontFamily="'Space Mono',monospace" fontWeight="bold" style={{pointerEvents:"none"}}>{startLabel}</text>;
      })()}

      {/* End handle (orange) */}
      <circle
        cx={tEnd.x} cy={tEnd.y} r={R_THUMB+4}
        fill="transparent"
        style={{cursor:"grab"}}
        onPointerDown={onPointerDown('end')}
      />
      <circle cx={tEnd.x} cy={tEnd.y} r={R_THUMB} fill={endColor} stroke={T.bg} strokeWidth={2}
        style={{cursor:"grab",filter:`drop-shadow(0 0 4px ${endColor}88)`}}
        onPointerDown={onPointerDown('end')}
      />


      {/* End time label — floats outside the ring near handle */}
      {(()=>{
        const labelR = R_TRACK + 22;
        const lx = CX + labelR * Math.cos(aEnd);
        const ly = CY + labelR * Math.sin(aEnd);
        const anchor = lx < CX - 10 ? "end" : lx > CX + 10 ? "start" : "middle";
        const endLabel = `${String(Math.floor(dayEnd)).padStart(2,'0')}:${dayEnd%1?'30':'00'}`;
        return <text x={lx} y={ly+4} textAnchor={anchor} fill={endColor} fontSize={9} fontFamily="'Space Mono',monospace" fontWeight="bold" style={{pointerEvents:"none"}}>{endLabel}</text>;
      })()}
    </svg>
    </div>
  );
}

// ── DonutChart (inner, inside the ring) — with drag-to-reorder ───────────────
function Donut({tasks,T,dayLen,onReorder}){
  const size=220, r=72, cx=110, cy=110, inner=45;
  const total=tasks.reduce((s,t)=>s+t.hours,0);
  const unalloc=Math.max(0,dayLen-total);
  const all=[...tasks,...(unalloc>0.001?[{id:"free",hours:unalloc,color:T.donutFree}]:[])];

  // Global dim: below 4h dayLen colors start fading. At 0h → 0.18, at 4h+ → 1.0
  const globalBright=Math.max(0.18, Math.min(1, dayLen/4));

  // Per-segment: task with tiny slice gets dimmer. share=0 → 0.35, share=1 → 1.0
  const getSegBright=(hours)=>{
    if(dayLen<=0) return 0.35;
    const share=hours/dayLen;
    return Math.max(0.35, Math.min(1, 0.35 + 0.65*share*all.length));
  };

  const [dragSeg,setDragSeg]=useState(null);
  const [overSeg,setOverSeg]=useState(null);
  const longPressRef=useRef(null);
  const svgRef=useRef();
  const wrapRef=useRef();

  // ── Smooth angle animation ───────────────────────────────────────────────
  // Store animated angles per segment key as refs to avoid re-renders
  const animAngles=useRef({}); // {id: {startA, sw}} current animated state
  const targetAngles=useRef({}); // {id: {startA, sw}} target state
  const animRaf=useRef(null);
  const [, forceRender]=useReducer(x=>x+1,0);

  // Compute target angles from current tasks
  const computeTargetAngles=useCallback(()=>{
    const tgt={};
    let a=-Math.PI/2;
    for(let i=0;i<all.length;i++){
      const t=all[i];
      const sw=(t.hours/dayLen)*2*Math.PI;
      tgt[t.id]={startA:a,sw:Math.max(0,sw)};
      a+=sw;
    }
    return tgt;
  },[all,dayLen]);

  // Lerp helper
  const lerpAngle=(a,b,t)=>a+(b-a)*t;

  // Drive animation loop
  const startAnim=useCallback(()=>{
    if(animRaf.current) return;
    const run=()=>{
      const tgt=targetAngles.current;
      const cur=animAngles.current;
      let needMore=false;
      const next={};
      for(const id of Object.keys(tgt)){
        const t=tgt[id];
        const c=cur[id]||{startA:t.startA,sw:t.sw};
        const dA=t.startA-c.startA;
        const dSw=t.sw-c.sw;
        if(Math.abs(dA)<0.0008&&Math.abs(dSw)<0.0008){
          next[id]={startA:t.startA,sw:t.sw};
        } else {
          next[id]={startA:lerpAngle(c.startA,t.startA,0.22),sw:lerpAngle(c.sw,t.sw,0.22)};
          needMore=true;
        }
      }
      animAngles.current=next;
      forceRender();
      if(needMore){
        animRaf.current=requestAnimationFrame(run);
      } else {
        animRaf.current=null;
      }
    };
    animRaf.current=requestAnimationFrame(run);
  },[]);

  // On tasks/dayLen change, update targets and kick off animation
  useEffect(()=>{
    const tgt=computeTargetAngles();
    targetAngles.current=tgt;
    // Seed any new segments instantly so they don't fly in from zero
    for(const id of Object.keys(tgt)){
      if(!animAngles.current[id]){
        animAngles.current[id]={...tgt[id]};
      }
    }
    startAnim();
  },[tasks,dayLen]);

  useEffect(()=>()=>{if(animRaf.current)cancelAnimationFrame(animRaf.current);},[]);

  // Build segs from animated angles
  const segs=all.map((t)=>{
    const aState=animAngles.current[t.id]||targetAngles.current[t.id];
    if(!aState||aState.sw<0.002) return null;
    return {t,startA:aState.startA,sw:aState.sw,endA:aState.startA+aState.sw};
  });

  const getTaskIdxFromAngle=(e)=>{
    const rect=(wrapRef.current||svgRef.current).getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    const x=(clientX-rect.left)/rect.width*size-cx;
    const y=(clientY-rect.top)/rect.height*size-cy;
    const dist=Math.sqrt(x*x+y*y);
    if(dist<inner||dist>r+12) return null;
    let angle=Math.atan2(y,x);
    for(let i=0;i<segs.length;i++){
      const s=segs[i];
      if(!s||s.t.id==="free") continue;
      let normA=((angle-s.startA)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
      let normSw=((s.endA-s.startA)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
      if(normA<=normSw) return i;
    }
    return null;
  };

  const onPointerDown=(i)=>(e)=>{
    if(all[i].id==="free") return;
    e.preventDefault();
    const taskIdx=i;
    const pid=e.pointerId;
    wrapRef.current?.setPointerCapture(pid);
    longPressRef.current=setTimeout(()=>{
      try{if(navigator.vibrate)navigator.vibrate([10,30,10]);}catch{}
      setDragSeg(taskIdx);
    },400);
  };

  const onPointerMove=(e)=>{
    if(dragSeg===null) return;
    e.preventDefault();
    const idx=getTaskIdxFromAngle(e);
    if(idx!==null&&all[idx]&&all[idx].id!=="free"&&idx!==dragSeg){
      setOverSeg(idx);
    } else {
      setOverSeg(null);
    }
  };

  const onPointerUp=(e)=>{
    clearTimeout(longPressRef.current);
    if(dragSeg!==null&&overSeg!==null&&overSeg!==dragSeg){
      onReorder(dragSeg,overSeg);
    }
    setDragSeg(null);
    setOverSeg(null);
  };

  const onPointerCancel=()=>{
    clearTimeout(longPressRef.current);
    setDragSeg(null);
    setOverSeg(null);
  };

  const pathFor=(seg)=>{
    const {startA,sw}=seg;
    const x1=cx+r*Math.cos(startA),y1=cy+r*Math.sin(startA);
    const x2=cx+r*Math.cos(startA+sw),y2=cy+r*Math.sin(startA+sw);
    return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${sw>Math.PI?1:0} 1 ${x2} ${y2} Z`;
  };

  return(
    <div
      ref={wrapRef}
      style={{position:"absolute",top:0,left:0,width:size,height:size,pointerEvents:dragSeg!==null?"auto":"none"}}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerCancel}
    >
    <svg ref={svgRef} width={size} height={size}
      style={{position:"absolute",top:0,left:0,pointerEvents:"none",touchAction:"none",cursor:dragSeg!==null?"grabbing":"default"}}
    >
      {segs.map((seg,i)=>{
        if(!seg) return null;
        const t=seg.t;
        const isFree=t.id==="free";
        const isThisDragging=dragSeg===i;
        const isThisOver=overSeg===i;
        const scale=isThisDragging?1.08:isThisOver?0.94:1;
        const segBright=isFree?globalBright:globalBright*getSegBright(t.hours);
        const baseOpacity=t.done?0.4:1;
        return(
          <g key={t.id||i}
            style={{
              transformOrigin:`${cx}px ${cy}px`,
              transform:`scale(${scale})`,
              transition:dragSeg!==null?"transform 0.15s ease":"transform 0.25s ease",
              cursor:isFree?"default":dragSeg!==null?"grabbing":"grab",
              opacity: isThisDragging?1:(baseOpacity*segBright),
            }}
            pointerEvents={isFree?"none":"auto"}
            onPointerDown={isFree?undefined:onPointerDown(i)}
          >
            <path
              d={pathFor(seg)}
              fill={isThisOver?"#888":(t.done?"#444":t.color)}
              stroke={isThisDragging?t.color:T.bg}
              strokeWidth={isThisDragging?2.5:1.5}
              style={{
                filter:isThisDragging?`drop-shadow(0 0 6px ${t.color}88)`:"none",
                transition:"fill 0.3s,opacity 0.3s,filter 0.15s",
              }}
            />
          </g>
        );
      })}
      {(()=>{
        return(<>
          <circle cx={cx} cy={cy} r={inner} fill={T.bg} style={{pointerEvents:"none"}}/>
          <text x={cx} y={cy-7} textAnchor="middle" fill={T.text} fontSize={12} fontFamily="'Space Mono',monospace" fontWeight="bold" style={{pointerEvents:"none"}}>{hm(total)}</text>
          <text x={cx} y={cy+9} textAnchor="middle" fill={dragSeg!==null?"#FF6B2B":T.textMuted} fontSize={8} fontFamily="'Space Mono',monospace" style={{pointerEvents:"none",transition:"fill 0.2s"}}>{dragSeg!==null?"swap ↕":"left"}</text>
        </>);
      })()}
    </svg>
    </div>
  );
}

function hexToHsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255;
  let g=parseInt(hex.slice(3,5),16)/255;
  let b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{
    const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;default:h=((r-g)/d+4)/6;}
  }
  return[h*360,s*100,l*100];
}
function hslToHex(h,s,l){
  s/=100;l/=100;
  const k=n=>(n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return '#'+[f(0),f(8),f(4)].map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join('');
}
// Adjust a hex color's lightness by a delta (-100..100) and saturation by sDelta
function adjustColor(hex,lDelta,sDelta=0){
  if(!hex||!hex.startsWith('#')||hex.length<7) return hex;
  try{
    const[h,s,l]=hexToHsl(hex);
    return hslToHex(h,Math.max(0,Math.min(100,s+sDelta)),Math.max(0,Math.min(100,l+lDelta)));
  }catch{return hex;}
}

function Slider({value,max,color,step,locked,onChange}){
  const ref=useRef();
  const drag=useRef(false);
  const lastSnapped=useRef(value);
  const animFrame=useRef(null);
  const displayRef=useRef(null); // direct DOM refs for zero-re-render animation
  const thumbRef=useRef(null);
  const targetRawRef=useRef(value); // raw (un-snapped) target in hours
  const currentRawRef=useRef(value);

  const applyPct=(pct)=>{
    const p=Math.max(0,Math.min(100,pct));
    if(displayRef.current) displayRef.current.style.width=p+"%";
    if(thumbRef.current)   thumbRef.current.style.left=p+"%";
  };

  const animateTo=(targetHours)=>{
    targetRawRef.current=targetHours;
    if(animFrame.current) return;
    const run=()=>{
      const diff=targetRawRef.current - currentRawRef.current;
      if(Math.abs(diff)<0.0005){
        currentRawRef.current=targetRawRef.current;
        applyPct((currentRawRef.current/max)*100);
        animFrame.current=null;
        return;
      }
      currentRawRef.current+=diff*0.3;
      applyPct((currentRawRef.current/max)*100);
      animFrame.current=requestAnimationFrame(run);
    };
    animFrame.current=requestAnimationFrame(run);
  };

  // Sync when value changes externally
  useEffect(()=>{
    animateTo(value);
  },[value,max]);

  useEffect(()=>()=>{if(animFrame.current)cancelAnimationFrame(animFrame.current);},[]);

  const getRaw=useCallback((cx)=>{
    const r=ref.current.getBoundingClientRect();
    return Math.max(0,Math.min(1,(cx-r.left)/r.width))*max;
  },[max]);
  const getSnapped=useCallback((cx)=>{
    return snap(getRaw(cx),step);
  },[getRaw,step]);

  const tryHaptic=()=>{try{if(navigator.vibrate)navigator.vibrate(4);}catch{}};

  const pd=(e)=>{
    if(locked)return;
    e.preventDefault();
    drag.current=true;
    ref.current.setPointerCapture(e.pointerId);
    const raw=getRaw(e.clientX);
    // Instant jump to finger position — no lerp on initial touch
    currentRawRef.current=raw;
    targetRawRef.current=raw;
    applyPct((raw/max)*100);
    const v=snap(raw,step);
    onChange(v);
    lastSnapped.current=v;
  };
  const pm=(e)=>{
    if(!drag.current)return;
    const raw=getRaw(e.clientX);
    // Animate display smoothly toward raw finger position
    animateTo(raw);
    const v=snap(raw,step);
    if(v!==lastSnapped.current){tryHaptic();lastSnapped.current=v;}
    onChange(v);
  };
  const pu=(e)=>{
    if(drag.current){
      drag.current=false;
      const v=getSnapped(e.clientX);
      onChange(v);
      animateTo(v);
    }
  };

  const initPct=(value/max)*100;
  return(
    <div ref={ref} onPointerDown={pd} onPointerMove={pm} onPointerUp={pu}
      style={{position:"relative",height:36,borderRadius:8,cursor:locked?"not-allowed":"pointer",userSelect:"none",touchAction:locked?"pan-y":"none",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"var(--bg-slider)",borderRadius:8}}/>
      <div ref={displayRef} style={{position:"absolute",left:0,top:0,bottom:0,width:`${initPct}%`,background:`linear-gradient(90deg,${color}55,${color}cc)`,borderRadius:8}}/>
      <div ref={thumbRef} style={{position:"absolute",left:`${initPct}%`,top:"50%",transform:"translate(-50%,-50%)",width:22,height:28,background:locked?"#555":color,borderRadius:5,boxShadow:locked?"none":`0 2px 10px ${color}88`,pointerEvents:"none",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.2s"}}>
        {locked
          ? <span style={{fontSize:9,color:"#fff",opacity:0.7}}>🔒</span>
          : <div style={{width:2,height:10,background:"rgba(0,0,0,0.25)",borderRadius:1}}/>
        }
      </div>
    </div>
  );
}

function TaskCard({task,stepMinutes,dayLen,totalTaskHours,T,onChange,onDelete,onEdit,onLock,onFav,isFav,onLongPressStart,onLongPressEnd}){
  const done=!!task.done;
  const pct=dayLen>0?Math.round((task.hours/dayLen)*100):0;

  // Slider color: saturation scales with this task's share of total allocated time.
  // Biggest task → full color. Smallest → desaturated/faded.
  const shareOfTasks=totalTaskHours>0?task.hours/totalTaskHours:0;
  // shareOfTasks is 0..1 but skewed — normalize so the max task always hits full sat.
  // We just use it directly: s drops by up to 50pts, l drops by up to 12pts for small tasks.
  const sDelta=done?-100:(shareOfTasks-1)*55; // 0 for biggest, -55 for zero share
  const lDelta=done?0:(shareOfTasks-1)*15;    // 0 for biggest, -15 for zero share
  const sliderColor=done?"#555":adjustColor(task.color,lDelta,sDelta);
  return(
    <div
      style={{background:T.bgCard,border:`1px solid ${done?"#404040":T.border}`,borderRadius:12,padding:"10px 12px 9px",marginBottom:7,transition:"background 0.25s,border 0.25s",userSelect:"none"}}
      onPointerDown={onLongPressStart}
      onPointerUp={onLongPressEnd}
      onPointerCancel={onLongPressEnd}
      onContextMenu={e=>e.preventDefault()}
    >
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
        {/* Drag handle hint */}
        <div style={{cursor:"grab",padding:"0 2px",color:T.textFaint,fontSize:12,flexShrink:0,userSelect:"none",touchAction:"none"}}>⠿</div>
        <button onClick={onEdit} style={{width:16,height:16,borderRadius:"50%",background:done?"#555":task.color,border:"none",flexShrink:0,boxShadow:done?"none":`0 0 6px ${task.color}88`,padding:0}}/>
        <span onClick={onEdit} style={{fontFamily:"'Space Mono',monospace",fontSize:12,color:done?T.textFaint:T.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",cursor:"pointer",textDecoration:done?"line-through":"none"}}>{task.name}</span>
        <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:done?T.textFaint:task.color,fontWeight:"bold",flexShrink:0}}>{hm(task.hours)}</span>
        <span style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:T.textFaint,flexShrink:0,opacity:0.7}}>{pct}%</span>
        <div style={{display:"flex",gap:0,flexShrink:0}} onPointerDown={e=>e.stopPropagation()}>
          <Btn44 onClick={()=>onChange({done:!done})} title={done?"Undo":"Done"}>
            <span style={{fontSize:12,opacity:done?1:0.3}}>{done?"✅":"☑️"}</span>
          </Btn44>
          {!isFav&&<Btn44 onClick={onFav} title="Mark as goal achieved">
            <span style={{fontSize:12,opacity:0.3}}>★</span>
          </Btn44>}
          <Btn44 onClick={onLock} title={task.locked?"Unlock":"Lock"}>
            <span style={{fontSize:12,opacity:task.locked?1:0.3}}>🔒</span>
          </Btn44>
          {!task.locked&&<Btn44 onClick={onDelete} danger title="Delete"><span style={{fontSize:11,color:T.textDim}}>✕</span></Btn44>}
        </div>
      </div>
      <div onPointerDown={e=>e.stopPropagation()}>
        <Slider value={task.hours} max={dayLen} step={stepMinutes} color={sliderColor} locked={task.locked||done} onChange={h=>onChange({hours:h})}/>
      </div>
    </div>
  );
}

  const ticks=[0,0.25,0.5,0.75,1].map(f=>Math.round((dayStart+f*dayLen)*2)/2);

  const [dragPos,setDragPos]=useState({x:0,y:0});
  const longPressTimer=useRef(null);
  const confirmRmTimer=useRef(null);
  const taskListRef=useRef();
  const fileRef=useRef(),inputRef=useRef();

  const {tasks,favs,step,dark,showTL,dayStart,dayEnd}=state;

  useEffect(()=>{ wrs(state); },[state]);

    document.documentElement.style.setProperty("--border-mid",T.borderMid);
    document.body.style.background=T.bg;
    document.getElementById("themeColorMeta").content=T.tc;
  },[dark]);

  const total=tasks.reduce((s,t)=>s+t.hours,0);
  const remaining=dayLen-total;
  const over=remaining<-0.001,perfect=Math.abs(remaining)<0.001;
  const toast2=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),2500);};
  const setConfirmRmWithTimer=(name)=>{
    clearTimeout(confirmRmTimer.current);
    setConfirmRm(name);
    if(name!==null) confirmRmTimer.current=setTimeout(()=>setConfirmRm(null),3000);
  };

  const addTask=(nameArg,colorArg,hoursArg)=>{
    const name=(nameArg||newName).trim();
    if(!name)return;
    if(tasks.some(t=>t.name.toLowerCase()===name.toLowerCase())){toast2("Task already exists","err");return;}
    dispatch({type:"ADD_TASK",name,color:colorArg,hours:hoursArg});
    setConfirmRmWithTimer(null);
    setNewName("");
    inputRef.current?.blur();
  };

  // ── Long-press drag handlers ──────────────────────────────────────────────
  const startLongDrag=(i,e)=>{
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    clearTimeout(longPressTimer.current);
    longPressTimer.current=setTimeout(()=>{
      try{if(navigator.vibrate)navigator.vibrate([12,40,12]);}catch{}
      setLongDragIdx(i);
      setDragPos({x:clientX,y:clientY});
    },400);
  };
  const cancelLongPress=()=>clearTimeout(longPressTimer.current);

  useEffect(()=>{
    if(longDragIdx===null) return;
    const onMove=(e)=>{
      const clientX=e.touches?e.touches[0].clientX:e.clientX;
      const clientY=e.touches?e.touches[0].clientY:e.clientY;
      setDragPos({x:clientX,y:clientY});
      // find which task index we're over
      const els=taskListRef.current?.querySelectorAll("[data-taskcard]");
      if(!els) return;
      let found=null;
      for(let i=0;i<els.length;i++){
        const r=els[i].getBoundingClientRect();
        if(clientY>=r.top&&clientY<=r.bottom){found=i;break;}
      }
      setDragOver(found!==null&&found!==longDragIdx?found:null);
    };
    const onUp=()=>{
      if(dragOver!==null&&longDragIdx!==null&&dragOver!==longDragIdx){
        dispatch({type:"REORDER_TASKS",from:longDragIdx,to:dragOver});
      }
      setLongDragIdx(null);
      setDragOver(null);
    };
    window.addEventListener("pointermove",onMove,{passive:true});
    window.addEventListener("pointerup",onUp);
    window.addEventListener("touchmove",onMove,{passive:true});
    window.addEventListener("touchend",onUp);
    return()=>{
      window.removeEventListener("pointermove",onMove);
      window.removeEventListener("pointerup",onUp);
      window.removeEventListener("touchmove",onMove);
      window.removeEventListener("touchend",onUp);
    };
  },[longDragIdx,dragOver]);

  const exportMD=()=>{
    const blob=new Blob([serializeMD(tasks,dayStart,dayEnd)],{type:"text/markdown"});
    const url=URL.createObjectURL(blob),a=document.createElement("a");
    a.href=url;a.download="sliders.md";a.click();URL.revokeObjectURL(url);
    toast2("Exported ✓");
  };
  const handleFile=(e)=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const {tasks:p,dayStart:ds,dayEnd:de}=parseMD(ev.target.result);
      if(!p.length){toast2("No tasks found","err");return;}
      dispatch({type:"SET_TASKS",tasks:p});
      if(ds!==null&&de!==null&&de>ds) dispatch({type:"SET_DAY_WINDOW",start:ds,end:de});
      toast2(`${p.length} tasks loaded`);
    };
    reader.readAsText(f);e.target.value="";
  };

  return(
    <div className="main-wrap" style={{minHeight:"100dvh",background:T.bg,color:T.text,fontFamily:"'Space Mono',monospace",maxWidth:520,margin:"0 auto",paddingBottom:100,transition:"background 0.25s,color 0.25s"}}>

      {/* HEADER */}
      <div className="sticky-header" style={{background:T.bg,transition:"background 0.25s"}}>
        <div style={{padding:"14px 16px 12px",borderBottom:`1px solid ${T.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"baseline",gap:8}}>
              <h1 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:3,color:"#FF6B2B",lineHeight:1}}>SLIDERS</h1>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:8,color:T.textFaint,background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:4,padding:"2px 5px",letterSpacing:1}}>{step}m</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
              <div style={{textAlign:"left",width:96,flexShrink:0}}>
                <div style={{fontSize:26,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1,lineHeight:1,color:over?"#ff4444":perfect?"#4ECDC4":T.textSub,whiteSpace:"nowrap"}}>
                  {perfect?`${hm(dayLen)} ✓`:hm(Math.abs(remaining))}
                </div>
                <div style={{fontSize:8,color:over?"#ff4444":T.textFaint,letterSpacing:1}}>{over?"OVER BY":perfect?"ALLOCATED":"REMAINING"}</div>
              </div>
              <div style={{flexShrink:0,width:66}}>
                <ThemeToggle dark={dark} onToggle={()=>dispatch({type:"SET_DARK",dark:!dark})} T={T}/>
              </div>
            </div>
          </div>
        </div>
        {/* Allocation progress bar */}
        <div style={{height:2,background:T.bgSlider,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${Math.min(100,(total/dayLen)*100)}%`,background:over?"#ff4444":perfect?"#4ECDC4":"#FF6B2B",transition:"width 0.2s,background 0.2s",borderRadius:"0 2px 2px 0"}}/>
        </div>
      </div>

      <div style={{padding:"0 16px"}}>

        {/* DONUT + CIRCULAR SLIDER */}
        <div style={{margin:"12px 0",padding:"16px 16px 12px",background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:14}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {/* Circular slider with donut inside */}
            <div style={{position:"relative",width:220,height:220,flexShrink:0,margin:"14px 16px"}}>
              <CircularDaySlider
                dayStart={dayStart} dayEnd={dayEnd} T={T}
                onChange={(s,e)=>dispatch({type:"SET_DAY_WINDOW",start:s,end:e})}
              />
              <Donut tasks={tasks} T={T} dayLen={dayLen} onReorder={(from,to)=>dispatch({type:"REORDER_TASKS",from,to})}/>
            </div>

            {/* Legend + start now */}
            <div style={{flex:1,overflow:"hidden",minWidth:0,display:"flex",flexDirection:"column",gap:0}}>
              {tasks.map(t=>{
                const pct=dayLen>0?Math.max(2,(t.hours/dayLen)*100):0;
                const color=t.done?"#555":t.color;
                return(
                  <div key={t.id} style={{marginBottom:7,opacity:t.done?0.4:1,transition:"opacity 0.2s"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                      <span style={{fontSize:10,color:t.done?T.textFaint:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textDecoration:t.done?"line-through":"none",maxWidth:"65%",fontFamily:"'Space Mono',monospace"}}>{t.name}</span>
                      <span style={{fontSize:9,color:color,flexShrink:0,fontFamily:"'Space Mono',monospace",opacity:0.9}}>{hm(t.hours)}</span>
                    </div>
                    <div style={{height:4,borderRadius:3,background:T.bgSlider,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${pct}%`,borderRadius:3,background:color,boxShadow:t.done?"none":`0 0 6px ${color}66`,transition:"width 0.3s"}}/>
                    </div>
                  </div>
                );
              })}
              {remaining>0.001&&(
                <div style={{marginBottom:7,opacity:0.5}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                    <span style={{fontSize:10,color:T.textMuted,fontFamily:"'Space Mono',monospace"}}>free</span>
                    <span style={{fontSize:9,color:T.textMuted,fontFamily:"'Space Mono',monospace"}}>{hm(remaining)}</span>
                  </div>
                  <div style={{height:4,borderRadius:3,background:T.bgSlider,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.max(2,(remaining/dayLen)*100)}%`,borderRadius:3,background:T.borderMid,transition:"width 0.3s"}}/>
                  </div>
                </div>
              )}
              {tasks.length===0&&<span style={{fontSize:10,color:T.textFaint}}>No tasks yet</span>}
              <button
                onClick={()=>{
                  const now=new Date();
                  const totalMins=now.getHours()*60+now.getMinutes();
                  const snapped=Math.ceil(totalMins/step)*step;
                  const h=Math.min(snapped/60, 23.5);
                  dispatch({type:"SET_DAY_START",start:h});
                  toast2("Start → now ✓");
                }}
                style={{marginTop:6,background:"none",border:`1px solid ${T.borderMid}`,borderRadius:8,padding:"7px 10px",color:T.textMuted,fontFamily:"'Space Mono',monospace",fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",gap:5,transition:"all 0.15s",letterSpacing:0.5}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor="#4ECDC4";e.currentTarget.style.color="#4ECDC4";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=T.borderMid;e.currentTarget.style.color=T.textMuted;}}
                onTouchStart={e=>{e.currentTarget.style.borderColor="#4ECDC4";e.currentTarget.style.color="#4ECDC4";}}
                onTouchEnd={e=>{e.currentTarget.style.borderColor=T.borderMid;e.currentTarget.style.color=T.textMuted;}}
              ><span>⏱</span> start now</button>
            </div>
          </div>
        </div>

        {/* TIMELINE */}
        {showTL&&<Timeline tasks={tasks} T={T} dayLen={dayLen} dayStart={dayStart}/>}

        {/* SETTINGS */}
        <div style={{marginBottom:10}}>
          <div style={{marginBottom:6}}>
            <button onClick={()=>setShowSettings(v=>!v)}
              style={{width:"100%",background:"none",border:`1px solid ${T.border}`,borderRadius:10,padding:"9px 14px",color:T.textMuted,fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:1,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
              <span>⚙ SETTINGS</span>
              <span style={{fontSize:11}}>{showSettings?"▲":"▼"}</span>
            </button>
          </div>

          {showSettings&&(
            <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 16px",animation:"slideIn 0.15s ease"}}>

              {/* Timeline toggle only */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${T.border}`,marginBottom:12}}>
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:T.textSub}}>Timeline view</span>
                <button onClick={()=>dispatch({type:"SET_SHOW_TL",v:!showTL})}
                  style={{width:44,height:24,borderRadius:12,background:showTL?"#FF6B2B":"#484850",border:"none",position:"relative",cursor:"pointer",transition:"background 0.2s",flexShrink:0}}>
                  <div style={{position:"absolute",top:3,left:showTL?22:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.2s",boxShadow:"0 1px 4px rgba(0,0,0,0.3)"}}/>
                </button>
              </div>

              {/* SNAP SIZE */}
              <div style={{marginBottom:12}}>
                <div style={{fontSize:9,color:T.textDim,letterSpacing:1.5,marginBottom:8,fontFamily:"'Space Mono',monospace"}}>SNAP SIZE</div>
                <div style={{display:"flex",gap:6}}>
                  {STEPS.map(s=>{
                    const active=s.m===step;
                    return(
                      <button key={s.m} onClick={()=>dispatch({type:"SET_STEP",step:s.m})}
                        style={{flex:1,background:active?"#FF6B2B":T.bgInput,border:`1px solid ${active?"#FF6B2B":T.border}`,borderRadius:8,padding:"8px 0",color:active?"#000":T.textMuted,fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:active?"bold":"normal",transition:"all 0.15s"}}>
                        {s.l}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* FILE — export/import only */}
              <div style={{marginBottom:12}}>
                <div style={{fontSize:9,color:T.textDim,letterSpacing:1.5,marginBottom:8,fontFamily:"'Space Mono',monospace"}}>FILE</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <FileBtn label="⬇ EXPORT .MD" onClick={exportMD} dark={dark}/>
                  <FileBtn label="⬆ IMPORT .MD" onClick={()=>fileRef.current.click()} dark={dark}/>
                </div>
              </div>

              <input ref={fileRef} type="file" accept=".md" style={{display:"none"}} onChange={handleFile}/>

              {/* DANGER ZONE */}
              <div>
                <div style={{fontSize:9,color:T.textDim,letterSpacing:1.5,marginBottom:8,fontFamily:"'Space Mono',monospace"}}>DANGER</div>
                {!confirmReset?(
                  <button onClick={()=>setConfirmReset(true)} style={{width:"100%",background:"none",border:"1px solid #cc3333",borderRadius:10,padding:"10px",color:"#cc3333",fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:1,cursor:"pointer"}}>
                    ⚠ RESET APP
                  </button>
                ):(
                  <div style={{background:"#1a0000",border:"1px solid #ff2222",borderRadius:10,padding:"14px",animation:"slideIn 0.15s ease"}}>
                    <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:"#ff4444",marginBottom:12,lineHeight:1.6}}>
                      Reset everything?<br/>
                      <span style={{fontSize:9,color:"#cc4444",opacity:0.8}}>Tasks, favourites and settings will be wiped.</span>
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>{localStorage.removeItem(KEY);window.location.reload();}}
                        style={{flex:1,background:"#cc0000",border:"none",borderRadius:8,padding:"10px",color:"#fff",fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:"bold",minHeight:44}}>
                        YES
                      </button>
                      <button onClick={()=>setConfirmReset(false)}
                        style={{flex:1,background:"none",border:`1px solid ${dark?"#505055":"#a8a6a0"}`,borderRadius:8,padding:"10px",color:T.textMuted,fontFamily:"'Space Mono',monospace",fontSize:11,minHeight:44}}>
                        CANCEL
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
        {/* FAVOURITES DROPDOWN */}
        <div style={{marginBottom:12}}>
          <button
            onClick={()=>setShowFavs(v=>!v)}
            style={{width:"100%",background:"none",border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 16px",color:T.textMuted,fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:1,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",marginBottom:showFavs?8:0,transition:"margin 0.15s"}}
          >
            <span>★ FAVOURITES{favs.length>0?` (${favs.length})`:""}</span>
            <span style={{fontSize:12}}>{showFavs?"▲":"▼"}</span>
          </button>
          {showFavs&&(
            <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",animation:"slideIn 0.15s ease"}}>
              {favs.length===0&&(
                <div style={{textAlign:"center",padding:"16px 0",fontFamily:"'Space Mono',monospace",fontSize:11,color:T.textFaint,letterSpacing:1}}>NO FAVOURITES YET — STAR A TASK</div>
              )}
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                {favs.map(f=>{
                  const active=tasks.some(t=>t.name.toLowerCase()===f.name.toLowerCase());
                  const pending=confirmRm===f.name;
                  const MAX_CHARS=14;
                  const displayName=pending?"tap to cancel":(f.name.length>MAX_CHARS?f.name.slice(0,MAX_CHARS)+"…":f.name);
                  return(
                    <div key={f.name} style={{display:"flex",alignItems:"center",borderRadius:10,overflow:"hidden",border:`1px solid ${pending?"#ff5555":active?f.color:T.border}`,opacity:active?0.45:1,transition:"all 0.15s"}}>
                      <button onClick={()=>{if(pending){setConfirmRmWithTimer(null);return;}if(!active)addTask(f.name,f.color,f.hours);}}
                        style={{background:pending?"#3a0a0a":active?T.bgCard:`${f.color}22`,border:"none",padding:"8px 12px",display:"flex",alignItems:"center",gap:7,cursor:active&&!pending?"default":"pointer",minHeight:40}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:pending?"#ff5555":f.color,flexShrink:0}}/>
                        <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:pending?"#ff7777":active?T.textFaint:T.text,whiteSpace:"nowrap"}}>
                          {displayName}
                        </span>
                        {!pending&&<span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:f.color,opacity:0.8}}>{hm(f.hours)}</span>}
                      </button>
                      <button onClick={()=>pending?(dispatch({type:"DEL_FAV",name:f.name}),setConfirmRmWithTimer(null)):setConfirmRmWithTimer(f.name)}
                        style={{background:pending?"#ff444430":"none",border:"none",borderLeft:`1px solid ${pending?"#ff5555":T.border}`,padding:"8px 10px",color:pending?"#ff5555":T.textDim,fontSize:11,cursor:"pointer",minHeight:40,display:"flex",alignItems:"center",fontFamily:"'Space Mono',monospace",transition:"all 0.15s"}}
                        onMouseEnter={e=>{if(!pending)e.currentTarget.style.color="#ff5555";}}
                        onMouseLeave={e=>{if(!pending)e.currentTarget.style.color=T.textDim;}}
                      >{pending?"remove":"✕"}</button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        {/* TASKS */}
        <div style={{marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontSize:10,color:T.textDim,letterSpacing:2,fontFamily:"'Space Mono',monospace"}}>TASKS{tasks.length>0?` · ${tasks.filter(t=>t.done).length}/${tasks.length} done`:""}</div>
            {tasks.length>1&&<button
              onClick={()=>{dispatch({type:"DISTRIBUTE"});toast2("Distributed ✓");}}
              style={{background:"none",border:`1px solid ${T.borderMid}`,borderRadius:7,padding:"4px 10px",color:T.textMuted,fontFamily:"'Space Mono',monospace",fontSize:9,cursor:"pointer",letterSpacing:0.5,transition:"all 0.15s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="#4ECDC4";e.currentTarget.style.color="#4ECDC4";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=T.borderMid;e.currentTarget.style.color=T.textMuted;}}
            >⇄ distribute</button>}
          </div>
          {tasks.length===0&&(
            <div style={{textAlign:"center",padding:"28px 0 20px",borderRadius:12,border:`1px dashed ${T.border}`}}>
              <div style={{fontSize:24,marginBottom:8}}>📋</div>
              <div style={{fontSize:11,color:T.textFaint,letterSpacing:1}}>No tasks yet</div>
              <div style={{fontSize:10,color:T.textFaint,opacity:0.6,marginTop:4}}>Add one below ↓</div>
            </div>
          )}
          {/* brightness based on total allocation ratio */}
          {(()=>{
            return(
              <div ref={taskListRef} style={{opacity:longDragIdx!==null?0.92:1,transition:"opacity 0.2s"}}>
                {tasks.map((t,i)=>{
                  const isFloating=longDragIdx===i;
                  const isOver=dragOver===i;
                  return(
                    <div key={t.id}
                      data-taskcard={i}
                      style={{
                        opacity:isFloating?0.25:1,
                        transform:isOver?"translateY(-3px) scale(1.01)":isFloating?"scale(0.97)":"none",
                        transition:"opacity 0.2s,transform 0.15s",
                        filter:isOver?`drop-shadow(0 4px 12px ${t.color}55)`:"none",
                        borderRadius:12,
                      }}
                    >
                      <TaskCard task={t} stepMinutes={step} dayLen={dayLen} totalTaskHours={total} T={T}
                        onChange={patch=>dispatch({type:"UPD_TASK",id:t.id,patch})}
                        onDelete={()=>dispatch({type:"DEL_TASK",id:t.id})}
                        onEdit={()=>setEditTask({...t})}
                        onLock={()=>dispatch({type:"UPD_TASK",id:t.id,patch:{locked:!t.locked}})}
                        isFav={favs.some(f=>f.name.toLowerCase()===t.name.toLowerCase())}
                        onFav={()=>{
                          if(favs.some(f=>f.name.toLowerCase()===t.name.toLowerCase()))
                            dispatch({type:"DEL_FAV",name:t.name});
                          else dispatch({type:"ADD_FAV",task:t});
                        }}
                        onLongPressStart={(e)=>startLongDrag(i,e)}
                        onLongPressEnd={cancelLongPress}
                      />
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>

        {/* FLOATING DRAG CARD */}
        {longDragIdx!==null&&tasks[longDragIdx]&&(()=>{
          const t=tasks[longDragIdx];
          return(
            <div style={{
              position:"fixed",
              left:dragPos.x-140,
              top:dragPos.y-28,
              width:280,
              zIndex:300,
              pointerEvents:"none",
              animation:"floatIn 0.15s ease",
              filter:`drop-shadow(0 8px 24px ${t.color}66)`,
            }}>
              <div style={{
                background:T.bgCard,
                border:`2px solid ${t.color}`,
                borderRadius:12,
                padding:"10px 14px",
                display:"flex",
                alignItems:"center",
                gap:8,
                transform:"rotate(-1.5deg) scale(1.04)",
              }}>
                <div style={{width:12,height:12,borderRadius:"50%",background:t.color,boxShadow:`0 0 8px ${t.color}`}}/>
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:12,color:T.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</span>
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:t.color,fontWeight:"bold"}}>{hm(t.hours)}</span>
              </div>
            </div>
          );
        })()}

        {/* ADD TASK */}
        <div style={{display:"flex",gap:8,marginBottom:24}}>
          <input ref={inputRef} value={newName}
            onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&addTask()}
            placeholder="Add a task…"
            style={{flex:1,background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:10,padding:"13px 16px",color:T.text,fontFamily:"'Space Mono',monospace",fontSize:14,transition:"border-color 0.2s"}}
            onFocus={e=>e.target.style.borderColor="#FF6B2B"}
            onBlur={e=>e.target.style.borderColor=T.border}
          />
          <button onClick={()=>addTask()}
            style={{background:"#FF6B2B",border:"none",borderRadius:10,padding:"13px 18px",color:"#000",fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:1,flexShrink:0,minWidth:70,minHeight:52,transition:"opacity 0.1s"}}
            onTouchStart={e=>e.currentTarget.style.opacity="0.75"}
            onTouchEnd={e=>e.currentTarget.style.opacity="1"}
            onMouseEnter={e=>e.currentTarget.style.opacity="0.85"}
            onMouseLeave={e=>e.currentTarget.style.opacity="1"}
          >ADD</button>
        </div>
      </div>

      {/* EDIT MODAL */}
      {editTask&&(
        <EditModal task={editTask} T={T}
          onSave={patch=>{dispatch({type:"UPD_TASK",id:editTask.id,patch});setEditTask(null);toast2("Task updated ✓");}}
          onClose={()=>setEditTask(null)}/>
      )}

      {/* TOAST */}
      {toast&&(
        <div style={{position:"fixed",bottom:"calc(20px + env(safe-area-inset-bottom,0px))",left:"50%",transform:"translateX(-50%)",zIndex:200,background:toast.type==="err"?"#ff444422":"#FF6B2B22",border:`1px solid ${toast.type==="err"?"#ff4444":"#FF6B2B"}`,borderRadius:24,padding:"12px 22px",fontFamily:"'Space Mono',monospace",fontSize:12,color:toast.type==="err"?"#ff7777":"#FF6B2B",animation:"toastIn 0.2s ease",whiteSpace:"nowrap",backdropFilter:"blur(8px)"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

function Root() {
  return <App />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
