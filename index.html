<body style="background:#1c1c1e">
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback,useReducer}=React;

const TOTAL=24;
const KEY="sliders_v5";
const PALETTE=["#FF6B2B","#FFB347","#4ECDC4","#A8E6CF","#FF8B94","#C9B1FF","#85C1E9","#F8D56B","#B5EAD7","#FF9AA2","#F06292","#81C784","#64B5F6","#FFD54F","#A1887F","#90A4AE"];
const STEPS=[{l:"1m",m:1},{l:"2m",m:2},{l:"5m",m:5},{l:"10m",m:10},{l:"15m",m:15},{l:"30m",m:30},{l:"1h",m:60}];
const DARK={bg:"#1c1c1e",bgCard:"#2a2a2e",bgInput:"#323236",bgSlider:"#3a3a3e",border:"#424246",borderMid:"#505055",text:"#f5f5f5",textSub:"#d8d8d8",textMuted:"#aaaaaa",textDim:"#888",textFaint:"#666",donutFree:"#3a3a3e",tc:"#1c1c1e"};
const LIGHT={bg:"#f4f3ef",bgCard:"#eceae4",bgInput:"#e4e2db",bgSlider:"#d8d6cf",border:"#cac8c1",borderMid:"#bbb9b2",text:"#1a1a1a",textSub:"#2e2e2e",textMuted:"#555",textDim:"#777",textFaint:"#999",donutFree:"#d8d6cf",tc:"#f4f3ef"};

const DEF_TASKS=[
  {id:1,name:"Sleep",hours:8,originalHours:8,color:PALETTE[0],locked:false,actual:0},
  {id:2,name:"Work",hours:6,originalHours:6,color:PALETTE[1],locked:false,actual:0},
  {id:3,name:"Exercise",hours:1,originalHours:1,color:PALETTE[2],locked:false,actual:0},
];

// ── helpers ───────────────────────────────────────────────────────────────────
function hm(h){
  const m=Math.round(h*60),H=Math.floor(m/60),M=m%60;
  if(H===0)return`${M}m`;if(M===0)return`${H}h`;return`${H}h ${M}m`;
}
function snap(h,s){return Math.round(h*60/s)*s/60;}
function rds(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):null;}catch{return null;}}
function wrs(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch{}}

// ── Proportional scaling ──────────────────────────────────────────────────────
// Scale tasks so their hours sum to targetTotal, preserving original proportions.
// Uses originalHours as the weight reference.
// Any rounding remainder is added to the largest task to keep sum exact.
function scaleTasksToTotal(tasks, targetTotal) {
  if(tasks.length === 0) return tasks;
  const origSum = tasks.reduce((s,t)=>(t.originalHours||t.hours)+s, 0);
  if(origSum <= 0) return tasks;
  // Convert to minutes for integer rounding
  const targetMin = Math.round(targetTotal * 60);
  const origSumMin = origSum * 60;
  // Calculate each task's new minutes
  let assigned = 0;
  const newMins = tasks.map((t,i) => {
    if(i === tasks.length-1) {
      // Last task gets remainder to ensure exact total
      return targetMin - assigned;
    }
    const m = Math.round((t.originalHours || t.hours) / origSum * targetMin);
    assigned += m;
    return m;
  });
  return tasks.map((t,i)=>({...t, hours: Math.max(0, newMins[i]/60)}));
}

function parseMD(text){
  const tasks=[];
  for(const line of text.split("\n")){
    const m=line.match(/^## (.+?) \[(\d+(?:\.\d+)?)h\] (#[0-9a-fA-F]{6})?/);
    if(m) tasks.push({
      id:Date.now()+Math.random(),
      name:m[1].trim(),
      hours:parseFloat(m[2]),
      originalHours:parseFloat(m[2]),
      color:m[3]||PALETTE[tasks.length%PALETTE.length],
      locked:false,actual:0
    });
  }
  return tasks;
}
function serializeMD(tasks, dayStart=0, dayEnd=24){
  const dayLen=dayEnd-dayStart;
  const total=tasks.reduce((s,t)=>s+t.hours,0),unalloc=Math.max(0,dayLen-total);
  let out=`# Sliders — Daily Time Allocation\n\n`;
  out+=`> Day: ${String(dayStart).padStart(2,'0')}:00 → ${String(dayEnd).padStart(2,'0')}:00 (${hm(dayLen)})\n`;
  out+=`> Total: ${hm(total)} / ${hm(dayLen)} | Unallocated: ${hm(unalloc)}\n\n---\n\n`;
  for(const t of tasks) out+=`## ${t.name} [${t.hours.toFixed(4)}h] ${t.color}\n- Planned: ${hm(t.hours)} (${((t.hours/dayLen)*100).toFixed(1)}%)\n- Actual: ${hm(t.actual||0)}\n\n`;
  return out+`---\n_Generated by Sliders App_\n`;
}

// ── State ─────────────────────────────────────────────────────────────────────
function initState(){
  const s=rds();
  return {
    tasks:   s?.tasks   ?? DEF_TASKS,
    favs:    s?.favs    ?? [],
    step:    s?.step    ?? 30,
    dark:    s?.dark    ?? true,
    showAct: s?.showAct ?? false,
    showTL:  s?.showTL  ?? false,
    dayStart:s?.dayStart?? 0,
    dayEnd:  s?.dayEnd  ?? 24,
  };
}

function reducer(state,action){
  const dayLen = state.dayEnd - state.dayStart;
  switch(action.type){

    case 'ADD_TASK':{
      const {name,color,hours}=action;
      const fav=state.favs.find(f=>f.name.toLowerCase()===name.toLowerCase());
      const total=state.tasks.reduce((s,t)=>s+t.hours,0);
      const rem=dayLen-total;
      const h=hours!==undefined?hours:fav?fav.hours:Math.max(0,snap(Math.min(state.step/60,rem),state.step));
      const c=color||fav?.color||PALETTE[state.tasks.length%PALETTE.length];
      return {...state,tasks:[...state.tasks,{id:Date.now(),name,hours:h,originalHours:h,color:c,locked:false,actual:0}]};
    }

    case 'UPD_TASK':{
      const tasks=state.tasks.map(t=>{
        if(t.id!==action.id) return t;
        const updated={...t,...action.patch};
        // When user manually moves a slider, update originalHours too
        if(action.patch.hours!==undefined) updated.originalHours=action.patch.hours;
        return updated;
      });
      let favs=state.favs;
      if(action.patch.hours!==undefined||action.patch.color!==undefined){
        const t=state.tasks.find(t=>t.id===action.id);
        if(t&&state.favs.some(f=>f.name.toLowerCase()===t.name.toLowerCase())){
          favs=state.favs.map(f=>f.name.toLowerCase()===t.name.toLowerCase()
            ?{...f,...(action.patch.hours!==undefined&&{hours:action.patch.hours}),...(action.patch.color!==undefined&&{color:action.patch.color})}
            :f);
        }
      }
      return {...state,tasks,favs};
    }

    case 'DEL_TASK':
      return {...state,tasks:state.tasks.filter(t=>t.id!==action.id)};

    case 'SET_TASKS':
      return {...state,tasks:action.tasks};

    case 'ADD_FAV':{
      const t=action.task;
      if(state.favs.some(f=>f.name.toLowerCase()===t.name.toLowerCase())) return state;
      return {...state,favs:[...state.favs,{name:t.name,hours:t.hours,color:t.color}]};
    }

    case 'DEL_FAV':
      return {...state,favs:state.favs.filter(f=>f.name.toLowerCase()!==action.name.toLowerCase())};

    case 'DISTRIBUTE':{
      const unlocked=state.tasks.filter(t=>!t.locked);
      if(!unlocked.length) return state;
      const lockedH=state.tasks.filter(t=>t.locked).reduce((s,t)=>s+t.hours,0);
      const each=snap((dayLen-lockedH)/unlocked.length,state.step);
      return {...state,tasks:state.tasks.map(t=>t.locked?t:{...t,hours:each,originalHours:each})};
    }

    case 'SET_DAY_WINDOW':{
      const {start,end}=action;
      const newLen=end-start;
      if(newLen<=0) return state;
      // Scale all tasks proportionally to new day length
      const scaled=scaleTasksToTotal(state.tasks, newLen);
      return {...state,dayStart:start,dayEnd:end,tasks:scaled};
    }

    case 'SET_STEP':    return {...state,step:action.step};
    case 'SET_DARK':    return {...state,dark:action.dark};
    case 'SET_SHOW_ACT':return {...state,showAct:action.v};
    case 'SET_SHOW_TL': return {...state,showTL:action.v};

    default: return state;
  }
}

// ── Circular Day Window Slider ────────────────────────────────────────────────
// Wraps around the donut. Two handles: start (green) and end (orange).
// Hours 0-24 mapped to 0-360 degrees, starting from top (-90deg).
function CircularDaySlider({dayStart, dayEnd, T, onChange}) {
  const SIZE = 200;   // SVG canvas size
  const CX = 100, CY = 100;
  const R_TRACK = 88; // radius of the ring track
  const R_THUMB = 9;  // radius of drag handles
  const STROKE = 10;  // track stroke width

  const svgRef = useRef();
  const dragging = useRef(null); // 'start' | 'end' | null

  // Convert hour (0-24) to angle in radians, 0h = top = -PI/2
  const hourToAngle = h => (h / 24) * 2 * Math.PI - Math.PI / 2;

  // Convert angle (rad) to hour (0-24), snapped to 0.5h
  const angleToHour = a => {
    let deg = ((a + Math.PI / 2) / (2 * Math.PI) * 24 + 24) % 24;
    return Math.round(deg * 2) / 2; // 30-min snap
  };

  const aStart = hourToAngle(dayStart);
  const aEnd   = hourToAngle(dayEnd);

  // Arc path from aStart to aEnd (the active window)
  const arcPath = (a1, a2) => {
    // Ensure arc goes clockwise from a1 to a2
    let da = ((a2 - a1) + 2*Math.PI) % (2*Math.PI);
    if(da === 0) da = 2*Math.PI; // full circle
    const large = da > Math.PI ? 1 : 0;
    const x1 = CX + R_TRACK * Math.cos(a1);
    const y1 = CY + R_TRACK * Math.sin(a1);
    const x2 = CX + R_TRACK * Math.cos(a2);
    const y2 = CY + R_TRACK * Math.sin(a2);
    return `M ${x1} ${y1} A ${R_TRACK} ${R_TRACK} 0 ${large} 1 ${x2} ${y2}`;
  };

  const thumbPos = (a) => ({
    x: CX + R_TRACK * Math.cos(a),
    y: CY + R_TRACK * Math.sin(a),
  });
  const tStart = thumbPos(aStart);
  const tEnd   = thumbPos(aEnd);

  const getAngleFromEvent = (e) => {
    const rect = svgRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const x = (clientX - rect.left) / rect.width * SIZE - CX;
    const y = (clientY - rect.top) / rect.height * SIZE - CY;
    return Math.atan2(y, x);
  };

  const onPointerDown = (which) => (e) => {
    e.preventDefault();
    e.stopPropagation();
    dragging.current = which;
    svgRef.current.setPointerCapture(e.pointerId);
  };

  const onPointerMove = (e) => {
    if(!dragging.current) return;
    const a = getAngleFromEvent(e);
    const h = angleToHour(a);
    if(dragging.current === 'start') {
      // start must be < end, min 1h gap
      const newStart = h >= dayEnd ? dayEnd - 1 : h;
      const clamped = Math.max(0, Math.min(newStart, dayEnd - 0.5));
      onChange(clamped, dayEnd);
    } else {
      // end must be > start, max 24
      const newEnd = h <= dayStart ? dayStart + 1 : h;
      const clamped = Math.max(dayStart + 0.5, Math.min(newEnd, 24));
      onChange(dayStart, clamped);
    }
  };

  const onPointerUp = () => { dragging.current = null; };

  const dayLen = dayEnd - dayStart;
  const textColor = T.text;
  const trackBg = T.bgSlider;
  const arcColor = "#FF6B2B";
  const startColor = "#4ECDC4";
  const endColor = "#FF6B2B";

  // Full circle background track
  const fullCircle = `M ${CX} ${CY-R_TRACK} A ${R_TRACK} ${R_TRACK} 0 1 1 ${CX-0.001} ${CY-R_TRACK}`;

  return (
    <svg
      ref={svgRef}
      width={SIZE} height={SIZE}
      style={{display:"block",flexShrink:0,touchAction:"none",userSelect:"none"}}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerLeave={onPointerUp}
    >
      {/* Background full ring */}
      <path d={fullCircle} fill="none" stroke={trackBg} strokeWidth={STROKE} strokeLinecap="round"/>

      {/* Active arc */}
      <path d={arcPath(aStart, aEnd)} fill="none" stroke={arcColor} strokeWidth={STROKE} strokeLinecap="round" opacity={0.85}/>

      {/* Hour tick marks at 0,6,12,18 */}
      {[0,6,12,18].map(h=>{
        const a=hourToAngle(h);
        const inner=R_TRACK-STROKE/2-3, outer=R_TRACK+STROKE/2+3;
        return <line key={h}
          x1={CX+inner*Math.cos(a)} y1={CY+inner*Math.sin(a)}
          x2={CX+outer*Math.cos(a)} y2={CY+outer*Math.sin(a)}
          stroke={T.border} strokeWidth={1.5}
        />;
      })}

      {/* Hour labels at 0,6,12,18 */}
      {[{h:0,label:"0"},{h:6,label:"6"},{h:12,label:"12"},{h:18,label:"18"}].map(({h,label})=>{
        const a=hourToAngle(h);
        const lr=R_TRACK+STROKE/2+14;
        return <text key={h}
          x={CX+lr*Math.cos(a)} y={CY+lr*Math.sin(a)+4}
          textAnchor="middle" fill={T.textFaint} fontSize={9}
          fontFamily="'Space Mono',monospace"
        >{label}</text>;
      })}

      {/* Center text */}
      <text x={CX} y={CY-8} textAnchor="middle" fill={textColor} fontSize={13} fontFamily="'Space Mono',monospace" fontWeight="bold">{hm(dayLen)}</text>
      <text x={CX} y={CY+8} textAnchor="middle" fill={T.textMuted} fontSize={9} fontFamily="'Space Mono',monospace">{`${String(Math.floor(dayStart)).padStart(2,'0')}:${dayStart%1?'30':'00'}`}–{`${String(Math.floor(dayEnd)).padStart(2,'0')}:${dayEnd%1?'30':'00'}`}</text>

      {/* Start handle (teal) */}
      <circle
        cx={tStart.x} cy={tStart.y} r={R_THUMB+4}
        fill="transparent"
        style={{cursor:"grab"}}
        onPointerDown={onPointerDown('start')}
      />
      <circle cx={tStart.x} cy={tStart.y} r={R_THUMB} fill={startColor} stroke={T.bg} strokeWidth={2}
        style={{cursor:"grab",filter:`drop-shadow(0 0 4px ${startColor}88)`}}
        onPointerDown={onPointerDown('start')}
      />
      <text x={tStart.x} y={tStart.y+4} textAnchor="middle" fill="#000" fontSize={7} fontFamily="'Space Mono',monospace" style={{pointerEvents:"none"}}>▶</text>

      {/* End handle (orange) */}
      <circle
        cx={tEnd.x} cy={tEnd.y} r={R_THUMB+4}
        fill="transparent"
        style={{cursor:"grab"}}
        onPointerDown={onPointerDown('end')}
      />
      <circle cx={tEnd.x} cy={tEnd.y} r={R_THUMB} fill={endColor} stroke={T.bg} strokeWidth={2}
        style={{cursor:"grab",filter:`drop-shadow(0 0 4px ${endColor}88)`}}
        onPointerDown={onPointerDown('end')}
      />
      <text x={tEnd.x} y={tEnd.y+4} textAnchor="middle" fill="#000" fontSize={7} fontFamily="'Space Mono',monospace" style={{pointerEvents:"none"}}>◼</text>
    </svg>
  );
}

// ── DonutChart (inner, inside the ring) ──────────────────────────────────────
function Donut({tasks,T,dayLen}){
  const size=200, r=72, cx=100, cy=100, inner=45;
  const total=tasks.reduce((s,t)=>s+t.hours,0);
  const unalloc=Math.max(0,dayLen-total);
  const all=[...tasks,...(unalloc>0.001?[{id:"free",hours:unalloc,color:T.donutFree}]:[])];
  let a=-Math.PI/2;
  return(
    <svg width={size} height={size} style={{position:"absolute",top:0,left:0,pointerEvents:"none"}}>
      {all.map((t,i)=>{
        const sw=(t.hours/dayLen)*2*Math.PI;
        if(sw<0.002)return null;
        const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a);a+=sw;
        const x2=cx+r*Math.cos(a),y2=cy+r*Math.sin(a);
        const d=`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${sw>Math.PI?1:0} 1 ${x2} ${y2} Z`;
        return <path key={t.id||i} d={d} fill={t.color} stroke={T.bg} strokeWidth={1.5}/>;
      })}
      <circle cx={cx} cy={cy} r={inner} fill={T.bg}/>
      <text x={cx} y={cy-7} textAnchor="middle" fill={T.text} fontSize={12} fontFamily="'Space Mono',monospace" fontWeight="bold">{hm(total)}</text>
      <text x={cx} y={cy+9} textAnchor="middle" fill={T.textMuted} fontSize={8} fontFamily="'Space Mono',monospace">allocated</text>
    </svg>
  );
}

// ── Linear Slider ─────────────────────────────────────────────────────────────
function Slider({value,max,color,step,locked,onChange}){
  const ref=useRef();const drag=useRef(false);
  const get=useCallback((cx)=>{
    const r=ref.current.getBoundingClientRect();
    return snap(Math.max(0,Math.min(1,(cx-r.left)/r.width))*max,step);
  },[step,max]);
  const pd=(e)=>{if(locked)return;e.preventDefault();drag.current=true;ref.current.setPointerCapture(e.pointerId);onChange(get(e.clientX));};
  const pm=(e)=>{if(drag.current)onChange(get(e.clientX));};
  const pu=(e)=>{if(drag.current){drag.current=false;onChange(get(e.clientX));}};
  const pct=(value/max)*100;
  return(
    <div ref={ref} onPointerDown={pd} onPointerMove={pm} onPointerUp={pu}
      style={{position:"relative",height:40,borderRadius:8,cursor:locked?"not-allowed":"pointer",userSelect:"none",touchAction:"none",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"var(--bg-slider)",borderRadius:8}}/>
      <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${pct}%`,background:`linear-gradient(90deg,${color}66,${color})`,borderRadius:8}}/>
      {[0.25,0.5,0.75].map((f,i)=><div key={i} style={{position:"absolute",left:`${f*100}%`,top:"15%",bottom:"15%",width:1,background:"var(--border-mid)",opacity:0.5}}/>)}
      <div style={{position:"absolute",left:`${pct}%`,top:"50%",transform:"translate(-50%,-50%)",width:20,height:32,background:locked?"#666":color,borderRadius:6,boxShadow:locked?"none":`0 2px 12px ${color}99`,pointerEvents:"none",display:"flex",alignItems:"center",justifyContent:"center"}}>
        {locked?<span style={{fontSize:10,color:"#fff"}}>🔒</span>:<div style={{width:2,height:12,background:"rgba(0,0,0,0.3)",borderRadius:1}}/>}
      </div>
    </div>
  );
}

function Btn44({onClick,danger,children,title}){
  return(
    <button onClick={onClick} title={title} style={{background:"none",border:"none",width:36,height:36,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,transition:"background 0.15s"}}
      onTouchStart={e=>e.currentTarget.style.background=danger?"#ff444430":"rgba(128,128,128,0.15)"}
      onTouchEnd={e=>e.currentTarget.style.background="none"}
      onMouseEnter={e=>e.currentTarget.style.background=danger?"#ff444430":"rgba(128,128,128,0.15)"}
      onMouseLeave={e=>e.currentTarget.style.background="none"}
    >{children}</button>
  );
}

function TaskCard({task,stepMinutes,dayLen,T,onChange,onDelete,onEdit,onLock,onFav,isFav,showActual}){
  const diff=(task.actual||0)-task.hours;
  // tick labels evenly from 0 to dayLen
  const ticks=[0,0.25,0.5,0.75,1].map(f=>hm(f*dayLen));
  return(
    <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 14px 12px",marginBottom:10,transition:"background 0.2s",opacity:task.locked?0.85:1}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <button onClick={onEdit} style={{width:20,height:20,borderRadius:"50%",background:task.color,border:"none",flexShrink:0,boxShadow:`0 0 8px ${task.color}88`,padding:0}}/>
        <span onClick={onEdit} style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:T.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",cursor:"pointer"}}>{task.name}</span>
        <span style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:task.color,fontWeight:"bold",flexShrink:0}}>{hm(task.hours)}</span>
        <div style={{display:"flex",gap:2,flexShrink:0}}>
          <Btn44 onClick={onFav} title={isFav?"Remove from favourites":"Add to favourites"}>
            <span style={{fontSize:14,color:isFav?"#FFB347":"inherit"}}>{isFav?"★":"☆"}</span>
          </Btn44>
          <Btn44 onClick={onLock} title={task.locked?"Unlock":"Lock"}>{task.locked?"🔓":"🔒"}</Btn44>
          {!task.locked&&<Btn44 onClick={onDelete} danger title="Delete">✕</Btn44>}
        </div>
      </div>
      <Slider value={task.hours} max={dayLen} step={stepMinutes} color={task.color} locked={task.locked} onChange={h=>onChange({hours:h})}/>
      {showActual&&(
        <div style={{marginTop:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <span style={{fontSize:9,color:T.textDim,letterSpacing:1}}>ACTUAL</span>
            <span style={{fontSize:10,color:diff>0?"#ff7777":diff<0?"#4ECDC4":T.textDim,fontFamily:"'Space Mono',monospace"}}>
              {hm(task.actual||0)}{diff!==0?` (${diff>0?"+":""}${hm(Math.abs(diff))})`:""}</span>
          </div>
          <Slider value={task.actual||0} max={dayLen} step={stepMinutes} color={diff>0?"#ff7777":"#4ECDC4"} locked={false} onChange={h=>onChange({actual:h})}/>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontFamily:"'Space Mono',monospace",fontSize:9,color:T.textFaint,paddingLeft:2,paddingRight:2}}>
        {ticks.map((l,i)=><span key={i}>{l}</span>)}
      </div>
    </div>
  );
}

function EditModal({task,T,onSave,onClose}){
  const [name,setName]=useState(task.name);
  const [color,setColor]=useState(task.color);
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-sheet" style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:"16px 16px 0 0",padding:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2,color:T.text}}>EDIT TASK</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:T.textMuted,fontSize:22,width:44,height:44,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        <label style={{fontSize:10,color:T.textDim,letterSpacing:2,display:"block",marginBottom:6}}>TASK NAME</label>
        <input value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&onSave({name:name.trim()||task.name,color})}
          style={{width:"100%",background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",color:T.text,fontFamily:"'Space Mono',monospace",fontSize:15,marginBottom:20}}/>
        <label style={{fontSize:10,color:T.textDim,letterSpacing:2,display:"block",marginBottom:10}}>COLOR</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:20}}>
          {PALETTE.map(c=>(
            <button key={c} onClick={()=>setColor(c)} style={{width:36,height:36,borderRadius:"50%",background:c,border:color===c?`3px solid ${T.text}`:`2px solid transparent`,padding:0,boxShadow:color===c?`0 0 0 2px ${T.bg}, 0 0 0 4px ${c}`:"none",transition:"all 0.15s"}}/>
          ))}
        </div>
        <button onClick={()=>onSave({name:name.trim()||task.name,color})}
          style={{width:"100%",background:"#FF6B2B",border:"none",borderRadius:12,padding:"15px",color:"#000",fontFamily:"'Space Mono',monospace",fontSize:14,fontWeight:"bold",letterSpacing:1,minHeight:52}}>
          SAVE CHANGES
        </button>
        <div style={{height:"env(safe-area-inset-bottom,0px)"}}/>
      </div>
    </div>
  );
}

function Timeline({tasks,T,dayLen,dayStart}){
  const rows=tasks.filter(t=>t.hours>0.02);
  let cursor=0;
  const segs=rows.map(t=>{const s=cursor;cursor+=t.hours;return{...t,start:s};});
  const ticks=[0,0.25,0.5,0.75,1].map(f=>Math.round((dayStart+f*dayLen)*2)/2);
  return(
    <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 14px 10px",marginBottom:16}}>
      <div style={{position:"relative",height:36,borderRadius:6,overflow:"hidden",background:T.bgSlider,marginBottom:6}}>
        {segs.map(s=>{
          const left=(s.start/dayLen)*100,width=(s.hours/dayLen)*100;
          return(
            <div key={s.id} style={{position:"absolute",left:`${left}%`,width:`${width}%`,top:0,bottom:0,background:s.color,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",minWidth:2}}>
              {width>7&&<span style={{fontSize:9,color:"rgba(0,0,0,0.65)",fontFamily:"'Space Mono',monospace",whiteSpace:"nowrap",padding:"0 4px",fontWeight:"bold"}}>{s.name}</span>}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontFamily:"'Space Mono',monospace",fontSize:9,color:T.textFaint,paddingLeft:2,paddingRight:2}}>
        {ticks.map((h,i)=><span key={i}>{h}:00</span>)}
      </div>
    </div>
  );
}

function ThemeToggle({dark,onToggle,T}){
  return(
    <button onClick={onToggle} style={{display:"flex",alignItems:"center",gap:8,background:"none",border:`1px solid ${T.border}`,borderRadius:24,padding:"8px 14px",minHeight:44}}>
      <span style={{fontSize:15}}>{dark?"☀️":"🌙"}</span>
      <div style={{width:36,height:20,borderRadius:10,background:dark?"#444":T.borderMid,position:"relative",transition:"background 0.2s",flexShrink:0}}>
        <div style={{position:"absolute",top:3,left:dark?16:3,width:14,height:14,borderRadius:"50%",background:"#FF6B2B",transition:"left 0.2s",boxShadow:"0 1px 4px rgba(0,0,0,0.4)"}}/>
      </div>
    </button>
  );
}
function CtrlBtn({label,onClick,dark}){
  return(
    <button onClick={onClick} style={{background:dark?"#0e0e10":"#d0cec8",border:`1px solid ${dark?"#505055":"#a8a6a0"}`,borderRadius:8,padding:"9px 14px",minHeight:40,color:dark?"#cccccc":"#2a2a2a",fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:0.5,flex:1,transition:"opacity 0.1s"}}
      onTouchStart={e=>e.currentTarget.style.opacity="0.7"}
      onTouchEnd={e=>e.currentTarget.style.opacity="1"}
    >{label}</button>
  );
}
function FileBtn({label,onClick,danger,dark}){
  return(
    <button onClick={onClick} style={{background:danger?(dark?"#3a0a0a":"#e8c0c0"):(dark?"#0e0e10":"#d0cec8"),border:`1px solid ${danger?"#ff5555":(dark?"#505055":"#a8a6a0")}`,borderRadius:10,padding:"12px 10px",minHeight:48,color:danger?"#ff7777":(dark?"#cccccc":"#2a2a2a"),fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:0.5,width:"100%",transition:"opacity 0.1s"}}
      onTouchStart={e=>e.currentTarget.style.opacity="0.7"}
      onTouchEnd={e=>e.currentTarget.style.opacity="1"}
    >{label}</button>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [state,dispatch]=useReducer(reducer,null,initState);
  const [newName,   setNewName]   =useState("");
  const [editTask,  setEditTask]  =useState(null);
  const [showFile,  setShowFile]  =useState(false);
  const [showImport,setShowImport]=useState(false);
  const [importTxt, setImportTxt] =useState("");
  const [mdView,    setMdView]    =useState(false);
  const [toast,     setToast]     =useState(null);
  const [confirmRm, setConfirmRm] =useState(null);
  const [confirmReset, setConfirmReset]=useState(false);
  const fileRef=useRef(),inputRef=useRef();

  const {tasks,favs,step,dark,showAct,showTL,dayStart,dayEnd}=state;
  const dayLen=dayEnd-dayStart;
  const T=dark?DARK:LIGHT;

  useEffect(()=>{ wrs(state); },[state]);
  useEffect(()=>{
    document.documentElement.style.setProperty("--bg-slider",T.bgSlider);
    document.documentElement.style.setProperty("--border-mid",T.borderMid);
    document.body.style.background=T.bg;
    document.getElementById("themeColorMeta").content=T.tc;
  },[dark]);

  const total=tasks.reduce((s,t)=>s+t.hours,0);
  const remaining=dayLen-total;
  const over=remaining<-0.001,perfect=Math.abs(remaining)<0.001;
  const toast2=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),2500);};

  const addTask=(nameArg,colorArg,hoursArg)=>{
    const name=(nameArg||newName).trim();
    if(!name)return;
    if(tasks.some(t=>t.name.toLowerCase()===name.toLowerCase())){toast2("Task already exists","err");return;}
    dispatch({type:"ADD_TASK",name,color:colorArg,hours:hoursArg});
    setNewName("");
    inputRef.current?.blur();
  };

  const exportMD=()=>{
    const blob=new Blob([serializeMD(tasks,dayStart,dayEnd)],{type:"text/markdown"});
    const url=URL.createObjectURL(blob),a=document.createElement("a");
    a.href=url;a.download="sliders.md";a.click();URL.revokeObjectURL(url);
    toast2("sliders.md exported!");
  };
  const handleFile=(e)=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const p=parseMD(ev.target.result);
      if(!p.length){toast2("No tasks found","err");return;}
      dispatch({type:"SET_TASKS",tasks:p});
      toast2(`${p.length} tasks loaded`);
    };
    reader.readAsText(f);e.target.value="";
  };
  const pasteImport=()=>{
    const p=parseMD(importTxt);
    if(!p.length){toast2("No tasks found","err");return;}
    dispatch({type:"SET_TASKS",tasks:p});
    setShowImport(false);setImportTxt("");
    toast2(`${p.length} tasks loaded`);
  };

  const SL=({children})=>(
    <div style={{fontSize:10,color:T.textDim,letterSpacing:2,marginBottom:10,fontFamily:"'Space Mono',monospace"}}>{children}</div>
  );

  return(
    <div className="main-wrap" style={{minHeight:"100dvh",background:T.bg,color:T.text,fontFamily:"'Space Mono',monospace",maxWidth:520,margin:"0 auto",paddingBottom:100,transition:"background 0.25s,color 0.25s"}}>

      {/* HEADER */}
      <div style={{background:T.bg,position:"sticky",top:0,zIndex:20,transition:"background 0.25s"}}>
        <div style={{padding:"18px 16px 14px",borderBottom:`1px solid ${T.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <h1 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:40,letterSpacing:3,color:"#FF6B2B",lineHeight:1}}>SLIDERS</h1>
              <div style={{fontSize:9,color:T.textDim,letterSpacing:1.5,marginTop:2}}>TIME ALLOCATOR · AUTO-SAVED</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
              <ThemeToggle dark={dark} onToggle={()=>dispatch({type:"SET_DARK",dark:!dark})} T={T}/>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:28,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1,lineHeight:1,color:over?"#ff4444":perfect?"#4ECDC4":T.textSub}}>
                  {perfect?`${hm(dayLen)} ✓`:hm(Math.abs(remaining))}
                </div>
                <div style={{fontSize:9,color:T.textDim,letterSpacing:1}}>{over?"OVER BY":perfect?"FULLY ALLOCATED":"REMAINING"}</div>
              </div>
            </div>
          </div>
          {over&&<div style={{marginTop:10,padding:"8px 12px",background:"#ff444412",border:"1px solid #ff444430",borderRadius:8,fontSize:11,color:"#ff7777"}}>⚠ Over by {hm(Math.abs(remaining))}</div>}
        </div>
      </div>

      <div style={{padding:"0 16px"}}>

        {/* DONUT + CIRCULAR SLIDER */}
        <div style={{margin:"16px 0",padding:16,background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:12}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {/* Circular slider with donut inside */}
            <div style={{position:"relative",width:200,height:200,flexShrink:0}}>
              <CircularDaySlider
                dayStart={dayStart} dayEnd={dayEnd} T={T}
                onChange={(s,e)=>dispatch({type:"SET_DAY_WINDOW",start:s,end:e})}
              />
              <Donut tasks={tasks} T={T} dayLen={dayLen}/>
            </div>

            {/* Legend */}
            <div style={{flex:1,overflow:"hidden",minWidth:0}}>
              {tasks.map(t=>(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
                  <div style={{width:9,height:9,borderRadius:2,background:t.color,flexShrink:0}}/>
                  <span style={{fontSize:11,color:T.textSub,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</span>
                  <span style={{fontSize:11,color:t.color,flexShrink:0,fontWeight:"bold"}}>{((t.hours/dayLen)*100).toFixed(0)}%</span>
                </div>
              ))}
              {remaining>0.001&&(
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <div style={{width:9,height:9,borderRadius:2,background:T.donutFree,border:`1px solid ${T.borderMid}`,flexShrink:0}}/>
                  <span style={{fontSize:11,color:T.textMuted,flex:1}}>Unallocated</span>
                  <span style={{fontSize:11,color:T.textMuted}}>{hm(remaining)}</span>
                </div>
              )}
              {tasks.length===0&&<span style={{fontSize:11,color:T.textFaint}}>No tasks yet</span>}
              {/* Day window info */}
              <div style={{marginTop:10,paddingTop:8,borderTop:`1px solid ${T.border}`}}>
                <div style={{fontSize:9,color:T.textDim,letterSpacing:1,marginBottom:2}}>DAY WINDOW</div>
                <div style={{fontSize:11,color:T.textSub,fontFamily:"'Space Mono',monospace"}}>
                  {`${String(Math.floor(dayStart)).padStart(2,'0')}:${dayStart%1?'30':'00'}`} → {`${String(Math.floor(dayEnd)).padStart(2,'0')}:${dayEnd%1?'30':'00'}`}
                </div>
                <div style={{fontSize:10,color:"#FF6B2B",fontFamily:"'Space Mono',monospace",fontWeight:"bold"}}>{hm(dayLen)}</div>
              </div>
            </div>
          </div>
        </div>

        {/* TIMELINE */}
        {showTL&&<Timeline tasks={tasks} T={T} dayLen={dayLen} dayStart={dayStart}/>}

        {/* CONTROLS */}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          <CtrlBtn label={showTL?"▲ TIMELINE":"▼ TIMELINE"} onClick={()=>dispatch({type:"SET_SHOW_TL",v:!showTL})} dark={dark}/>
          <CtrlBtn label={showAct?"PLANNED ONLY":"+ ACTUAL"} onClick={()=>dispatch({type:"SET_SHOW_ACT",v:!showAct})} dark={dark}/>
          <CtrlBtn label="⇄ DISTRIBUTE" onClick={()=>{dispatch({type:"DISTRIBUTE"});toast2("Distributed evenly ✓");}} dark={dark}/>
        </div>

        {/* STEP SIZE */}
        <div style={{marginBottom:18}}>
          <SL>STEP SIZE</SL>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {STEPS.map(s=>{
              const active=s.m===step;
              return(
                <button key={s.m} onClick={()=>dispatch({type:"SET_STEP",step:s.m})}
                  style={{background:active?(dark?"#5a5a62":"#b8b6b0"):T.bgCard,border:`1px solid ${active?(dark?"#7a7a82":"#8a8880"):T.border}`,borderRadius:8,padding:"9px 14px",minHeight:44,color:active?(dark?"#ffffff":"#111111"):T.textMuted,fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:active?"bold":"normal"}}>
                  {s.l}
                </button>
              );
            })}
          </div>
        </div>

        {/* FAVOURITES TRAY */}
        {favs.length>0&&(
          <div style={{marginBottom:18}}>
            <SL>FAVOURITES</SL>
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
              {favs.map(f=>{
                const active=tasks.some(t=>t.name.toLowerCase()===f.name.toLowerCase());
                const pending=confirmRm===f.name;
                return(
                  <div key={f.name} style={{display:"flex",alignItems:"center",borderRadius:10,overflow:"hidden",border:`1px solid ${pending?"#ff5555":active?f.color:T.border}`,opacity:active?0.45:1,transition:"all 0.15s"}}>
                    <button onClick={()=>{if(pending){setConfirmRm(null);return;}if(!active)addTask(f.name,f.color,f.hours);}}
                      style={{background:pending?"#3a0a0a":active?T.bgCard:`${f.color}22`,border:"none",padding:"8px 12px",display:"flex",alignItems:"center",gap:7,cursor:active&&!pending?"default":"pointer",minHeight:40}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:pending?"#ff5555":f.color,flexShrink:0}}/>
                      <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:pending?"#ff7777":active?T.textFaint:T.text,whiteSpace:"nowrap"}}>
                        {pending?"tap to cancel":f.name}
                      </span>
                      {!pending&&<span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:f.color,opacity:0.8}}>{hm(f.hours)}</span>}
                    </button>
                    <button onClick={()=>pending?(dispatch({type:"DEL_FAV",name:f.name}),setConfirmRm(null)):setConfirmRm(f.name)}
                      style={{background:pending?"#ff444430":"none",border:"none",borderLeft:`1px solid ${pending?"#ff5555":T.border}`,padding:"8px 10px",color:pending?"#ff5555":T.textDim,fontSize:11,cursor:"pointer",minHeight:40,display:"flex",alignItems:"center",fontFamily:"'Space Mono',monospace",transition:"all 0.15s"}}
                      onMouseEnter={e=>{if(!pending)e.currentTarget.style.color="#ff5555";}}
                      onMouseLeave={e=>{if(!pending)e.currentTarget.style.color=T.textDim;}}
                    >{pending?"remove":"✕"}</button>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* TASKS */}
        <div style={{marginBottom:16}}>
          <SL>TASKS — DRAG TO ALLOCATE</SL>
          {tasks.length===0&&<div style={{textAlign:"center",padding:"32px 0",fontSize:11,color:T.textFaint,letterSpacing:1.5}}>NO TASKS YET — ADD ONE BELOW</div>}
          {tasks.map(t=>(
            <TaskCard key={t.id} task={t} stepMinutes={step} dayLen={dayLen} T={T} showActual={showAct}
              onChange={patch=>dispatch({type:"UPD_TASK",id:t.id,patch})}
              onDelete={()=>dispatch({type:"DEL_TASK",id:t.id})}
              onEdit={()=>setEditTask({...t})}
              onLock={()=>dispatch({type:"UPD_TASK",id:t.id,patch:{locked:!t.locked}})}
              isFav={favs.some(f=>f.name.toLowerCase()===t.name.toLowerCase())}
              onFav={()=>{
                if(favs.some(f=>f.name.toLowerCase()===t.name.toLowerCase()))
                  dispatch({type:"DEL_FAV",name:t.name});
                else
                  dispatch({type:"ADD_FAV",task:t});
              }}
            />
          ))}
        </div>

        {/* ADD TASK */}
        <div style={{display:"flex",gap:10,marginBottom:24}}>
          <input ref={inputRef} value={newName}
            onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&addTask()}
            placeholder="New task name..."
            style={{flex:1,background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:10,padding:"13px 16px",color:T.text,fontFamily:"'Space Mono',monospace",fontSize:14,transition:"background 0.2s"}}/>
          <button onClick={()=>addTask()}
            style={{background:"#FF6B2B",border:"none",borderRadius:10,padding:"13px 20px",color:"#000",fontFamily:"'Space Mono',monospace",fontSize:13,fontWeight:"bold",flexShrink:0,minWidth:80,minHeight:52}}
            onTouchStart={e=>e.currentTarget.style.opacity="0.8"}
            onTouchEnd={e=>e.currentTarget.style.opacity="1"}
          >+ ADD</button>
        </div>

        {/* FILE */}
        <button onClick={()=>setShowFile(v=>!v)}
          style={{width:"100%",background:dark?"#0e0e10":"#d0cec8",border:`1px solid ${dark?"#505055":"#a8a6a0"}`,borderRadius:10,padding:"12px 16px",color:dark?"#cccccc":"#2a2a2a",fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:1,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>FILE</span>
          <span style={{fontSize:14}}>{showFile?"▲":"▼"}</span>
        </button>
        {showFile&&(
          <div style={{animation:"slideIn 0.2s ease"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <FileBtn label="⬇ EXPORT .MD" onClick={exportMD} dark={dark}/>
              <FileBtn label="⬆ IMPORT .MD" onClick={()=>fileRef.current.click()} dark={dark}/>
              <FileBtn label="✎ PASTE MD" onClick={()=>setShowImport(v=>!v)} dark={dark}/>
              <FileBtn label={mdView?"◀ HIDE MD":"▶ VIEW MD"} onClick={()=>setMdView(v=>!v)} dark={dark}/>
              <div style={{gridColumn:"1/-1"}}>
                <FileBtn label="✕ CLEAR ALL TASKS" onClick={()=>{dispatch({type:"SET_TASKS",tasks:[]});toast2("All tasks cleared");}} danger dark={dark}/>
              </div>
            </div>

            {/* RESET APP */}
            {!confirmReset?(
              <button onClick={()=>setConfirmReset(true)} style={{width:"100%",background:"#cc0000",border:"2px solid #ff2222",borderRadius:10,padding:"13px",color:"#ffffff",fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:"bold",letterSpacing:1,marginBottom:10,minHeight:48}}>
                ⚠ RESET APP
              </button>
            ):(
              <div style={{background:"#1a0000",border:"2px solid #ff2222",borderRadius:10,padding:"16px",marginBottom:10,animation:"slideIn 0.15s ease"}}>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:12,color:"#ff4444",marginBottom:14,letterSpacing:0.3,lineHeight:1.6}}>
                  Are you sure you want to reset?<br/>
                  <span style={{fontSize:10,color:"#cc4444"}}>All tasks, favourites and settings will be wiped. There is no going back.</span>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{
                    localStorage.removeItem(KEY);
                    setConfirmReset(false);
                    window.location.reload();
                  }} style={{flex:1,background:"#cc0000",border:"2px solid #ff2222",borderRadius:8,padding:"12px",color:"#fff",fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:"bold",minHeight:48}}>
                    YES, RESET
                  </button>
                  <button onClick={()=>setConfirmReset(false)} style={{flex:1,background:"none",border:`1px solid ${dark?"#505055":"#a8a6a0"}`,borderRadius:8,padding:"12px",color:dark?"#cccccc":"#2a2a2a",fontFamily:"'Space Mono',monospace",fontSize:12,minHeight:48}}>
                    NO, CANCEL
                  </button>
                </div>
              </div>
            )}
            <input ref={fileRef} type="file" accept=".md" style={{display:"none"}} onChange={handleFile}/>
            {showImport&&(
              <div style={{marginBottom:12}}>
                <textarea value={importTxt} onChange={e=>setImportTxt(e.target.value)}
                  placeholder={"Paste sliders.md content here...\n\nFormat:\n## Task name [8.0000h] #FF6B2B"}
                  style={{width:"100%",height:150,background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:10,padding:14,color:T.textSub,fontFamily:"'Space Mono',monospace",fontSize:12,lineHeight:1.7,marginBottom:8,resize:"none"}}/>
                <button onClick={pasteImport} style={{width:"100%",background:"#4ECDC420",border:"1px solid #4ECDC4",borderRadius:8,padding:"12px",color:"#4ECDC4",fontFamily:"'Space Mono',monospace",fontSize:11,minHeight:44}}>LOAD</button>
              </div>
            )}
            {mdView&&(
              <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:10,padding:14,marginBottom:12}}>
                <div style={{fontSize:10,color:T.textDim,letterSpacing:2,marginBottom:8}}>LIVE PREVIEW</div>
                <pre style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.textMuted,lineHeight:1.7,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{serializeMD(tasks,dayStart,dayEnd)}</pre>
              </div>
            )}
          </div>
        )}

        {/* TIPS */}
        <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:10,padding:14,marginBottom:16,marginTop:16}}>
          <div style={{fontSize:11,color:T.textDim,lineHeight:1.9}}>
            🕐 Drag the ring handles to set your day window<br/>
            🔒 Lock a task to keep it during manual slider changes<br/>
            ⇄ Distribute = split time equally across all tasks<br/>
            💾 Auto-saved · Export .MD to sync across devices
          </div>
        </div>

        {/* FOOTER */}
        {/* maintained by Peter Vincent — https://github.com/vpeter56/Sliders.html */}
        <div style={{textAlign:"center",padding:"8px 0 4px"}}>
          <a href="https://github.com/vpeter56/Sliders.html" target="_blank" rel="noopener noreferrer"
            style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:T.textFaint,textDecoration:"none",letterSpacing:0.5}}>
            maintained by Peter Vincent
          </a>
        </div>
      </div>

      {/* EDIT MODAL */}
      {editTask&&(
        <EditModal task={editTask} T={T}
          onSave={patch=>{dispatch({type:"UPD_TASK",id:editTask.id,patch});setEditTask(null);toast2("Task updated ✓");}}
          onClose={()=>setEditTask(null)}/>
      )}

      {/* TOAST */}
      {toast&&(
        <div style={{position:"fixed",bottom:"calc(20px + env(safe-area-inset-bottom,0px))",left:"50%",transform:"translateX(-50%)",zIndex:200,background:toast.type==="err"?"#ff444422":"#FF6B2B22",border:`1px solid ${toast.type==="err"?"#ff4444":"#FF6B2B"}`,borderRadius:24,padding:"12px 22px",fontFamily:"'Space Mono',monospace",fontSize:12,color:toast.type==="err"?"#ff7777":"#FF6B2B",animation:"toastIn 0.2s ease",whiteSpace:"nowrap",backdropFilter:"blur(8px)"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
