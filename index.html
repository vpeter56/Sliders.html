<style>

<body style="background:#1c1c1e">
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useReducer } = React;

const STORAGE_KEY = "sliders_data";
const WEEK_KEY = "sliders_week_v1";
const DAYS_HU = ["Hétfő","Kedd","Szerda","Csütörtök","Péntek","Szombat","Vasárnap"];
const DAYS_SHORT = ["H","K","SZ","CS","P","SZ","V"];

const USAGE_KEY = "sliders_task_usage";
function loadUsage() { try { const r = localStorage.getItem(USAGE_KEY); return r ? JSON.parse(r) : {}; } catch { return {}; } }
function saveUsage(u) { try { localStorage.setItem(USAGE_KEY, JSON.stringify(u)); } catch {} }
function recordUsage(name) {
  const u = loadUsage();
  const key = name.toLowerCase().trim();
  u[key] = (u[key] || 0) + 1;
  saveUsage(u);
}
function getTopUsed(n = 3) {
  const u = loadUsage();
  return Object.entries(u).sort((a,b)=>b[1]-a[1]).slice(0,n).map(([k])=>k);
}
  try { const r = localStorage.getItem(WEEK_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
}
function saveWeek(w) { try { localStorage.setItem(WEEK_KEY, JSON.stringify(w)); } catch {} }
function initWeek() {
  const saved = loadWeek();
  // 7 days, each with tasks array and optional note
  return saved || Array.from({length:7}, (_,i) => ({ dayIdx:i, tasks:[], note:"" }));
}
function weekTotalHours(dayData) {
  return dayData.tasks.reduce((s,t)=>s+(t.hours||0),0);
}
const PALETTE = ["#FF6B2B","#FFB347","#4ECDC4","#A8E6CF","#FF8B94","#C9B1FF","#85C1E9","#F8D56B","#B5EAD7","#FF9AA2","#F06292","#81C784","#64B5F6","#FFD54F","#A1887F","#90A4AE"];
const STEPS = [{l:"5m",m:5},{l:"10m",m:10},{l:"15m",m:15},{l:"30m",m:30}];
const DARK  = { bg:"#1c1c1e", bgCard:"#2a2a2e", bgInput:"#323236", bgSlider:"#484850", border:"#505058", borderMid:"#626268", text:"#ffffff", textSub:"#e8e8e8", textMuted:"#c0c0c0", textDim:"#a0a0a0", textFaint:"#888890", donutFree:"#3a3a3e", tc:"#1c1c1e" };
const LIGHT = { bg:"#f4f3ef", bgCard:"#eceae4", bgInput:"#e4e2db", bgSlider:"#d8d6cf", border:"#cac8c1", borderMid:"#bbb9b2", text:"#1a1a1a", textSub:"#2e2e2e", textMuted:"#555", textDim:"#777", textFaint:"#999", donutFree:"#d8d6cf", tc:"#f4f3ef" };
const DEFAULT_TASKS = [
  { id:1, name:"Sleep",    hours:8, originalHours:8, color:PALETTE[0], locked:false, actual:0 },
  { id:2, name:"Work",     hours:6, originalHours:6, color:PALETTE[1], locked:false, actual:0 },
  { id:3, name:"Exercise", hours:1, originalHours:1, color:PALETTE[2], locked:false, actual:0 },
];
const LONG_PRESS_MS = 400, TOAST_MS = 2500, CONFIRM_MS = 3000;
const LERP_SLIDER = 0.3, LERP_DONUT = 0.22, LERP_RING = 0.22;
const TOL = 0.001, TOL_SLIDER = 0.0005, TOL_ANGLE = 0.0008;
const MONO = "'Space Mono',monospace", BEBAS = "'Bebas Neue',sans-serif";

// ── Helpers ───────────────────────────────────────────────────────────────────

function formatHours(h) {
  const m = Math.round(h * 60), hh = Math.floor(m / 60), mm = m % 60;
  return hh === 0 ? `${mm}m` : mm === 0 ? `${hh}h` : `${hh}h ${mm}m`;
}
const snapToStep = (h, s) => Math.round(h * 60 / s) * s / 60;
const calcDayLen = (s, e) => e >= s ? e - s : (24 - s) + e;

function loadState() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; } }
function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} }

function migrateOldData() {
  try {
    if (localStorage.getItem(STORAGE_KEY)) return;
    for (const k of ["sliders_v5","sliders_v4","sliders_v3","sliders_v2","sliders_v1"]) {
      const d = localStorage.getItem(k);
      if (d) { localStorage.setItem(STORAGE_KEY, d); break; }
    }
  } catch {}
}

function scaleTasksToTotal(tasks, target) {
  if (!tasks.length) return tasks;
  const sum = tasks.reduce((s, t) => s + (t.hours || 0), 0);
  if (target >= sum - TOL || sum <= 0) return tasks;
  const tMin = Math.round(target * 60);
  let used = 0;
  const mins = tasks.map((t, i) => {
    if (i === tasks.length - 1) return Math.max(0, tMin - used);
    const m = Math.round((t.hours || 0) / sum * tMin); used += m; return m;
  });
  return tasks.map((t, i) => ({ ...t, hours: Math.max(0, mins[i] / 60) }));
}

function parseMD(text) {
  const tasks = []; let dayStart = null, dayEnd = null;
  for (const line of text.split("\n")) {
    const dm = line.match(/^> Day: (\d+(?:\.\d+)?):(\d+) → (\d+(?:\.\d+)?):(\d+)/);
    if (dm) { dayStart = +dm[1] + (dm[2]==="30"?.5:0); dayEnd = +dm[3] + (dm[4]==="30"?.5:0); }
    const tm = line.match(/^## (.+?) \[(\d+(?:\.\d+)?)h\] (#[0-9a-fA-F]{6})?/);
    if (tm) tasks.push({ id: Date.now()+Math.random(), name:tm[1].trim(), hours:+tm[2], originalHours:+tm[2], color:tm[3]||PALETTE[tasks.length%PALETTE.length], locked:false, actual:0 });
  }
  return { tasks, dayStart, dayEnd };
}

function serializeMD(tasks, s=0, e=24) {
  const dl = calcDayLen(s, e), total = tasks.reduce((a,t)=>a+t.hours,0);
  const tt = h => `${String(Math.floor(h)).padStart(2,"0")}:${h%1?"30":"00"}`;
  let out = `# Sliders — Daily Time Allocation\n\n> Day: ${tt(s)} → ${tt(e)} (${formatHours(dl)})\n> Total: ${formatHours(total)} / ${formatHours(dl)} | Unallocated: ${formatHours(Math.max(0,dl-total))}\n\n---\n\n`;
  for (const t of tasks) out += `## ${t.name} [${t.hours.toFixed(4)}h] ${t.color}\n- Planned: ${formatHours(t.hours)} (${dl>0?((t.hours/dl)*100).toFixed(1):"—"}%)\n- Actual: ${formatHours(t.actual||0)}\n\n`;
  return out + `---\n_Generated by Sliders App_\n`;
}

// ── Sync string encode/decode ─────────────────────────────────────────────────

function encodeSyncString(state) {
  const payload = {
    tasks: state.tasks,
    favs: state.favs,
    step: state.step,
    dark: state.dark,
    showTL: state.showTL,
    dayStart: state.dayStart,
    dayEnd: state.dayEnd,
    v: 1,
    ts: Date.now(),
  };
  try {
    return btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  } catch { return null; }
}

function decodeSyncString(str) {
  try {
    const json = decodeURIComponent(escape(atob(str.trim())));
    const d = JSON.parse(json);
    if (!d.tasks || !Array.isArray(d.tasks)) return null;
    return d;
  } catch { return null; }
}

function hexToHsl(hex) {
  let r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b); let h,s,l=(max+min)/2;
  if (max===min) { h=s=0; } else {
    const d=max-min; s=l>.5?d/(2-max-min):d/(max+min);
    h=max===r?((g-b)/d+(g<b?6:0))/6:max===g?((b-r)/d+2)/6:((r-g)/d+4)/6;
  }
  return [h*360,s*100,l*100];
}
function hslToHex(h,s,l) {
  s/=100; l/=100;
  const k=n=>(n+h/30)%12, a=s*Math.min(l,1-l), f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return "#"+[f(0),f(8),f(4)].map(x=>Math.round(x*255).toString(16).padStart(2,"0")).join("");
}
function adjustColor(hex, ld, sd=0) {
  if (!hex?.startsWith("#") || hex.length<7) return hex;
  try { const [h,s,l]=hexToHsl(hex); return hslToHex(h,Math.max(0,Math.min(100,s+sd)),Math.max(0,Math.min(100,l+ld))); }
  catch { return hex; }
}

// ── State ─────────────────────────────────────────────────────────────────────

function initState() {
  const s = loadState();
  return { tasks:s?.tasks??DEFAULT_TASKS, favs:s?.favs??[], step:s?.step??10, dark:s?.dark??true, showTL:s?.showTL??false, dayStart:s?.dayStart??10.5, dayEnd:s?.dayEnd??16 };
}

const nameLc = n => n.toLowerCase();

function reducer(state, action) {
  const dl = calcDayLen(state.dayStart, state.dayEnd);

  switch (action.type) {
    case "ADD_TASK": {
      const { name, color, hours } = action;
      const fav = state.favs.find(f => nameLc(f.name)===nameLc(name));
      const rem = Math.max(0, dl - state.tasks.reduce((s,t)=>s+t.hours,0));
      const h = Math.max(0, Math.min(hours??fav?.hours??snapToStep(Math.min(state.step/60,rem),state.step), rem||state.step/60));
      return { ...state, tasks: [...state.tasks, { id:Date.now(), name, hours:h, originalHours:h, color:color||fav?.color||PALETTE[state.tasks.length%PALETTE.length], locked:false, actual:0 }] };
    }
    case "UPD_TASK": {
      const orig = state.tasks.find(t=>t.id===action.id);
      const tasks = state.tasks.map(t => {
        if (t.id!==action.id) return t;
        const u = {...t,...action.patch};
        if (action.patch.hours!==undefined) u.originalHours = action.patch.hours;
        return u;
      });
      let favs = state.favs;
      if ((action.patch.hours!==undefined||action.patch.color!==undefined) && orig && favs.some(f=>nameLc(f.name)===nameLc(orig.name)))
        favs = favs.map(f => nameLc(f.name)===nameLc(orig.name) ? {...f,...(action.patch.hours!==undefined&&{hours:action.patch.hours}),...(action.patch.color!==undefined&&{color:action.patch.color})} : f);
      return { ...state, tasks, favs };
    }
    case "DEL_TASK":   return { ...state, tasks: state.tasks.filter(t=>t.id!==action.id) };
    case "SET_TASKS":  return { ...state, tasks: action.tasks };
    case "ADD_FAV": {
      const t = action.task;
      if (state.favs.some(f=>nameLc(f.name)===nameLc(t.name))) return state;
      return { ...state, favs: [...state.favs, {name:t.name,hours:t.hours,color:t.color}] };
    }
    case "DEL_FAV":    return { ...state, favs: state.favs.filter(f=>nameLc(f.name)!==nameLc(action.name)) };
    case "DISTRIBUTE": {
      const unlocked = state.tasks.filter(t=>!t.locked);
      if (!unlocked.length) return state;
      const h = snapToStep((dl - state.tasks.filter(t=>t.locked).reduce((s,t)=>s+t.hours,0)) / unlocked.length, state.step);
      return { ...state, tasks: state.tasks.map(t=>t.locked?t:{...t,hours:h,originalHours:h}) };
    }
    case "SET_DAY_WINDOW": {
      const { start, end } = action;
      const nl = calcDayLen(start, end);
      if (nl < 0.5) return state;
      const restored = nl > dl ? state.tasks.map(t=>({...t,hours:t.originalHours??t.hours})) : state.tasks;
      return { ...state, dayStart:start, dayEnd:end, tasks:scaleTasksToTotal(restored,nl) };
    }
    case "SET_DAY_START": {
      const nl = calcDayLen(action.start, state.dayEnd);
      if (nl < 0.5) return state;
      return { ...state, dayStart:action.start, tasks:scaleTasksToTotal(state.tasks,nl) };
    }
    case "REORDER_TASKS": {
      const tasks = [...state.tasks];
      tasks.splice(action.to, 0, tasks.splice(action.from, 1)[0]);
      return { ...state, tasks };
    }
    case "SET_STEP":    return { ...state, step:action.step };
    case "SET_DARK":    return { ...state, dark:action.dark };
    case "SET_SHOW_TL": return { ...state, showTL:action.v };
    case "FULL_REPLACE": {
      const d = action.data;
      return { ...state, tasks:d.tasks, favs:d.favs??state.favs, step:d.step??state.step, dark:d.dark??state.dark, showTL:d.showTL??state.showTL, dayStart:d.dayStart??state.dayStart, dayEnd:d.dayEnd??state.dayEnd };
    }
    case "MERGE_IMPORT": {
      const d = action.data;
      const existingTaskNames = new Set(state.tasks.map(t=>nameLc(t.name)));
      const newTasks = (d.tasks||[]).filter(t=>!existingTaskNames.has(nameLc(t.name)));
      const existingFavNames = new Set(state.favs.map(f=>nameLc(f.name)));
      const newFavs = (d.favs||[]).filter(f=>!existingFavNames.has(nameLc(f.name)));
      return { ...state, tasks:[...state.tasks,...newTasks], favs:[...state.favs,...newFavs] };
    }
    default: return state;
  }
}

// ── Ring slider ───────────────────────────────────────────────────────────────

const RING_SIZE=220, RING_CX=110, RING_CY=110, RING_RADIUS=88, RING_THUMB=9, RING_STROKE=10;
const RING_START_COLOR="#4ECDC4", RING_END_COLOR="#FF6B2B";
const FULL_CIRCLE_PATH = `M ${RING_CX} ${RING_CY-RING_RADIUS} A ${RING_RADIUS} ${RING_RADIUS} 0 1 1 ${RING_CX-0.001} ${RING_CY-RING_RADIUS}`;

const hourToAngle = h => (h/24)*2*Math.PI - Math.PI/2;
const angleToHour = a => (((a+Math.PI/2)/(2*Math.PI)*24)%24+24)%24;
const angleToHourSnapped = a => Math.round(angleToHour(a)*2)/2;
function angleDelta(from, to) {
  let d = ((to-from)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  if (d>Math.PI) d-=2*Math.PI; return d;
}
function ringArcPath(a1, a2) {
  let span = ((a2-a1)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  if (span<0.001) span=2*Math.PI;
  const large=span>Math.PI?1:0, x1=RING_CX+RING_RADIUS*Math.cos(a1), y1=RING_CY+RING_RADIUS*Math.sin(a1), x2=RING_CX+RING_RADIUS*Math.cos(a2), y2=RING_CY+RING_RADIUS*Math.sin(a2);
  return `M ${x1} ${y1} A ${RING_RADIUS} ${RING_RADIUS} 0 ${large} 1 ${x2} ${y2}`;
}

function RingTimeLabel({ hour, angleRad, color }) {
  const R=RING_RADIUS+22, lx=RING_CX+R*Math.cos(angleRad), ly=RING_CY+R*Math.sin(angleRad);
  return <text x={lx} y={ly+4} textAnchor={lx<RING_CX-10?"end":lx>RING_CX+10?"start":"middle"} fill={color} fontSize={11} fontFamily={MONO} fontWeight="bold" style={{pointerEvents:"none"}}>{String(Math.floor(hour)).padStart(2,"0")}:{hour%1?"30":"00"}</text>;
}

function CircularDaySlider({ dayStart, dayEnd, T, onChange }) {
  const svgRef=useRef(), dragging=useRef(null);
  // FIX: initialize display angles directly from props, no animation on first render
  const dispStartA=useRef(null), dispEndA=useRef(null);
  const tgtStartA=useRef(hourToAngle(dayStart)), tgtEndA=useRef(hourToAngle(dayEnd));
  const animRaf=useRef(null);
  const [,tick]=useReducer(x=>x+1,0);

  // init display angles immediately on first render
  if (dispStartA.current === null) {
    dispStartA.current = hourToAngle(dayStart);
    dispEndA.current = hourToAngle(dayEnd);
  }

  function startAnim() {
    if (animRaf.current) return;
    const run = () => {
      const dS=angleDelta(dispStartA.current,tgtStartA.current), dE=angleDelta(dispEndA.current,tgtEndA.current);
      dispStartA.current+=dS*LERP_RING; dispEndA.current+=dE*LERP_RING;
      if (Math.abs(dS)<TOL_SLIDER && Math.abs(dE)<TOL_SLIDER) {
        dispStartA.current=tgtStartA.current; dispEndA.current=tgtEndA.current;
        animRaf.current=null; tick(); return;
      }
      tick(); animRaf.current=requestAnimationFrame(run);
    };
    animRaf.current=requestAnimationFrame(run);
  }

  useEffect(() => {
    if (!dragging.current) { tgtStartA.current=hourToAngle(dayStart); tgtEndA.current=hourToAngle(dayEnd); startAnim(); }
  }, [dayStart, dayEnd]);
  useEffect(() => () => { if (animRaf.current) cancelAnimationFrame(animRaf.current); }, []);

  const dl = calcDayLen(dayStart, dayEnd);
  const tp = a => ({ x:RING_CX+RING_RADIUS*Math.cos(a), y:RING_CY+RING_RADIUS*Math.sin(a) });
  const tS=tp(dispStartA.current), tE=tp(dispEndA.current);

  const getAngle = e => {
    const rect=svgRef.current.getBoundingClientRect(), cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
    return Math.atan2((cy-rect.top)/rect.height*RING_SIZE-RING_CY, (cx-rect.left)/rect.width*RING_SIZE-RING_CX);
  };

  const onDown = which => e => { e.preventDefault(); e.stopPropagation(); dragging.current=which; svgRef.current.setPointerCapture(e.pointerId); };
  const onMove = e => {
    if (!dragging.current) return;
    const rawA=getAngle(e), h=angleToHourSnapped(rawA);
    if (dragging.current==="start") { tgtStartA.current=rawA; startAnim(); onChange(h,dayEnd); }
    else { tgtEndA.current=rawA; startAnim(); onChange(dayStart,h); }
  };
  const onUp = () => { dragging.current=null; tgtStartA.current=hourToAngle(dayStart); tgtEndA.current=hourToAngle(dayEnd); startAnim(); };

  const arcOp = 0.2+0.8*Math.max(0,Math.min(1,dl/24));
  const timeRange = `${String(Math.floor(dayStart)).padStart(2,"0")}:${dayStart%1?"30":"00"}–${String(Math.floor(dayEnd)).padStart(2,"0")}:${dayEnd%1?"30":"00"}`;

  const Handle = ({ pos, color, which }) => <>
    <circle cx={pos.x} cy={pos.y} r={RING_THUMB+4} fill="transparent" style={{cursor:"grab"}} onPointerDown={onDown(which)}/>
    <circle cx={pos.x} cy={pos.y} r={RING_THUMB} fill={color} stroke={T.bg} strokeWidth={2} style={{cursor:"grab",filter:`drop-shadow(0 0 4px ${color}88)`}} onPointerDown={onDown(which)}/>
  </>;

  return (
    <div style={{position:"relative",width:RING_SIZE,height:RING_SIZE,flexShrink:0}}>
      <svg ref={svgRef} width={RING_SIZE} height={RING_SIZE} style={{display:"block",touchAction:"none",userSelect:"none",overflow:"visible"}} onPointerMove={onMove} onPointerUp={onUp}>
        <path d={FULL_CIRCLE_PATH} fill="none" stroke={T.bgSlider} strokeWidth={RING_STROKE} strokeLinecap="round"/>
        <path d={ringArcPath(dispStartA.current,dispEndA.current)} fill="none" stroke={RING_END_COLOR} strokeWidth={RING_STROKE} strokeLinecap="round" opacity={arcOp} style={{transition:"opacity 0.3s"}}/>
        <text x={RING_CX} y={RING_CY-8} textAnchor="middle" fill={T.text} fontSize={15} fontFamily={MONO} fontWeight="bold">{formatHours(dl)}</text>
        <text x={RING_CX} y={RING_CY+8} textAnchor="middle" fill={T.textMuted} fontSize={11} fontFamily={MONO}>{timeRange}</text>
        <Handle pos={tS} color={RING_START_COLOR} which="start"/>
        <RingTimeLabel hour={dayStart} angleRad={dispStartA.current} color={RING_START_COLOR}/>
        <Handle pos={tE} color={RING_END_COLOR} which="end"/>
        <RingTimeLabel hour={dayEnd} angleRad={dispEndA.current} color={RING_END_COLOR}/>
      </svg>
    </div>
  );
}

// ── Donut ─────────────────────────────────────────────────────────────────────

const DONUT_SIZE=220, DONUT_R=72, DONUT_CX=110, DONUT_CY=110, DONUT_INNER=45;

function buildSegPath(sa, sw) {
  const x1=DONUT_CX+DONUT_R*Math.cos(sa), y1=DONUT_CY+DONUT_R*Math.sin(sa);
  const x2=DONUT_CX+DONUT_R*Math.cos(sa+sw), y2=DONUT_CY+DONUT_R*Math.sin(sa+sw);
  return `M ${DONUT_CX} ${DONUT_CY} L ${x1} ${y1} A ${DONUT_R} ${DONUT_R} 0 ${sw>Math.PI?1:0} 1 ${x2} ${y2} Z`;
}

// Build annular (donut ring) segment path for overlap visualization
function buildRingPath(sa, sw, rInner, rOuter) {
  if (sw < 0.001) return "";
  const large = sw > Math.PI ? 1 : 0;
  const x1=DONUT_CX+rOuter*Math.cos(sa), y1=DONUT_CY+rOuter*Math.sin(sa);
  const x2=DONUT_CX+rOuter*Math.cos(sa+sw), y2=DONUT_CY+rOuter*Math.sin(sa+sw);
  const x3=DONUT_CX+rInner*Math.cos(sa+sw), y3=DONUT_CY+rInner*Math.sin(sa+sw);
  const x4=DONUT_CX+rInner*Math.cos(sa), y4=DONUT_CY+rInner*Math.sin(sa);
  return `M ${x1} ${y1} A ${rOuter} ${rOuter} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${rInner} ${rInner} 0 ${large} 0 ${x4} ${y4} Z`;
}

// Calculate which angular ranges are "overflowed" (tasks beyond dayLen)
function calcOverflowAngles(tasks, dayLen) {
  if (dayLen <= 0) return [];
  const total = tasks.reduce((s,t)=>s+(t.hours||0), 0);
  if (total <= dayLen + TOL) return [];

  // The overflow starts at angle corresponding to dayLen, continues until total
  const overflowStart = (dayLen / total) * 2 * Math.PI; // fraction of the full circle that's "valid"
  // We need to find which segments are partially or fully in overflow
  const overlapSegs = [];
  let angle = 0;
  for (const t of tasks) {
    const sw = (t.hours / total) * 2 * Math.PI;
    const segEnd = angle + sw;
    if (segEnd > overflowStart) {
      // this segment has some overflow
      const overStart = Math.max(angle, overflowStart);
      overlapSegs.push({
        color: t.color,
        startFrac: overStart / (2*Math.PI),
        endFrac: segEnd / (2*Math.PI),
      });
    }
    angle = segEnd;
  }
  return overlapSegs;
}

function Donut({ tasks, T, dayLen, onReorder }) {
  const total=tasks.reduce((s,t)=>s+t.hours,0), unalloc=Math.max(0,dayLen-total);
  // For display: clamp each task to dayLen proportionally when over
  const displayTasks = total > dayLen + TOL
    ? tasks.map(t=>({...t, hours: t.hours * (dayLen/total)}))
    : tasks;
  const displayUnalloc = Math.max(0, dayLen - displayTasks.reduce((s,t)=>s+t.hours,0));
  const allSlices=[...displayTasks,...(displayUnalloc>TOL?[{id:"free",hours:displayUnalloc,color:T.donutFree}]:[])];

  const gb=Math.max(0.18,Math.min(1,dayLen/4));
  const segBright=h=>dayLen<=0?.35:Math.max(0.35,Math.min(1,0.35+0.65*(h/dayLen)*allSlices.length));

  const [dragSeg,setDragSeg]=useState(null), [overSeg,setOverSeg]=useState(null);
  const lpRef=useRef(), svgRef=useRef(), wrapRef=useRef();
  const animA=useRef({}), tgtA=useRef({}), animRaf=useRef(null);
  const [,rerender]=useReducer(x=>x+1,0);

  // FIX: init animA immediately to avoid first-frame pop
  const buildTargets = (slices, dl) => {
    const targets={};
    let angle=-Math.PI/2;
    for (const sl of slices) {
      const sw = dl > 0 ? (sl.hours/dl)*2*Math.PI : 0;
      targets[sl.id]={startA:angle,sw:Math.max(0,sw)};
      angle+=sw;
    }
    return targets;
  };

  useEffect(() => {
    const targets = buildTargets(allSlices, dayLen);
    tgtA.current=targets;
    // init missing entries without animation
    for (const id of Object.keys(targets)) {
      if (!animA.current[id]) animA.current[id]={...targets[id]};
    }
    if (animRaf.current) return;
    const run=()=>{
      const tgt=tgtA.current, cur=animA.current; let more=false; const next={};
      for (const id of Object.keys(tgt)) {
        const t=tgt[id], c=cur[id]||{...t};
        if (Math.abs(t.startA-c.startA)<TOL_ANGLE && Math.abs(t.sw-c.sw)<TOL_ANGLE) { next[id]={...t}; }
        else { next[id]={startA:c.startA+(t.startA-c.startA)*LERP_DONUT, sw:c.sw+(t.sw-c.sw)*LERP_DONUT}; more=true; }
      }
      animA.current=next; rerender();
      animRaf.current=more?requestAnimationFrame(run):null;
    };
    animRaf.current=requestAnimationFrame(run);
  }, [tasks, dayLen]);
  useEffect(()=>()=>{if(animRaf.current)cancelAnimationFrame(animRaf.current)},[]);

  const segs=allSlices.map(sl=>{
    const a=animA.current[sl.id]||tgtA.current[sl.id];
    if (!a||a.sw<0.002) return null;
    return {slice:sl,startA:a.startA,sw:a.sw,endA:a.startA+a.sw};
  });

  const getSegIdx=e=>{
    const rect=(wrapRef.current||svgRef.current).getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
    const x=(cx-rect.left)/rect.width*DONUT_SIZE-DONUT_CX, y=(cy-rect.top)/rect.height*DONUT_SIZE-DONUT_CY;
    const dist=Math.sqrt(x*x+y*y);
    if (dist<DONUT_INNER||dist>DONUT_R+12) return null;
    const ang=Math.atan2(y,x);
    for (let i=0;i<segs.length;i++) {
      const seg=segs[i]; if (!seg||seg.slice.id==="free") continue;
      const nA=((ang-seg.startA)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
      const nSw=((seg.endA-seg.startA)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
      if (nA<=nSw) return i;
    }
    return null;
  };

  const onDown=i=>e=>{ if(allSlices[i].id==="free")return; e.preventDefault(); wrapRef.current?.setPointerCapture(e.pointerId); lpRef.current=setTimeout(()=>{ try{if(navigator.vibrate)navigator.vibrate([10,30,10])}catch{} setDragSeg(i); },LONG_PRESS_MS); };
  const onMove=e=>{ if(dragSeg===null)return; e.preventDefault(); const i=getSegIdx(e); setOverSeg(i!==null&&allSlices[i]?.id!=="free"&&i!==dragSeg?i:null); };
  const onUp=()=>{ clearTimeout(lpRef.current); if(dragSeg!==null&&overSeg!==null&&overSeg!==dragSeg)onReorder(dragSeg,overSeg); setDragSeg(null);setOverSeg(null); };
  const onCancel=()=>{ clearTimeout(lpRef.current); setDragSeg(null);setOverSeg(null); };

  // Compute overflow overlay: angle where tasks overflow dayLen
  const isOver = total > dayLen + TOL;
  const overflowAngle = isOver ? -Math.PI/2 + (dayLen/total)*2*Math.PI : null;

  // unique pattern id
  const patId = "overflow-hatch";

  return (
    <div ref={wrapRef} style={{position:"absolute",top:0,left:0,width:DONUT_SIZE,height:DONUT_SIZE,pointerEvents:dragSeg!==null?"auto":"none"}} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onCancel}>
      <svg ref={svgRef} width={DONUT_SIZE} height={DONUT_SIZE} style={{position:"absolute",top:0,left:0,pointerEvents:"none",touchAction:"none",cursor:dragSeg!==null?"grabbing":"default"}}>
        <defs>
          {/* Diagonal hatch pattern for overflow */}
          <pattern id={patId} patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(255,60,60,0.55)" strokeWidth="2.5"/>
          </pattern>
          <clipPath id="donut-clip">
            <path d={`M ${DONUT_CX} ${DONUT_CY} m -${DONUT_R+2} 0 a ${DONUT_R+2} ${DONUT_R+2} 0 1 1 ${(DONUT_R+2)*2} 0 a ${DONUT_R+2} ${DONUT_R+2} 0 1 1 -${(DONUT_R+2)*2} 0 M ${DONUT_CX} ${DONUT_CY} m -${DONUT_INNER} 0 a ${DONUT_INNER} ${DONUT_INNER} 0 1 0 ${DONUT_INNER*2} 0 a ${DONUT_INNER} ${DONUT_INNER} 0 1 0 -${DONUT_INNER*2} 0`} fillRule="evenodd"/>
          </clipPath>
        </defs>

        {segs.map((seg,i)=>{
          if (!seg) return null;
          const {slice}=seg, isFree=slice.id==="free", isDrag=dragSeg===i, isOverSeg=overSeg===i;
          const bright=isFree?gb:gb*segBright(slice.hours);
          return (
            <g key={slice.id||i} style={{transformOrigin:`${DONUT_CX}px ${DONUT_CY}px`,transform:`scale(${isDrag?1.08:isOverSeg?.94:1})`,transition:dragSeg!==null?"transform 0.15s ease":"transform 0.25s ease",cursor:isFree?"default":dragSeg!==null?"grabbing":"grab",opacity:isDrag?1:(slice.done?.4:1)*bright}} pointerEvents={isFree?"none":"auto"} onPointerDown={isFree?undefined:onDown(i)}>
              <path d={buildSegPath(seg.startA,seg.sw)} fill={isOverSeg?"#888":(slice.done?"#444":slice.color)} stroke={isDrag?slice.color:T.bg} strokeWidth={isDrag?2.5:1.5} style={{filter:isDrag?`drop-shadow(0 0 6px ${slice.color}88)`:"none",transition:"fill 0.3s,opacity 0.3s,filter 0.15s"}}/>
            </g>
          );
        })}

        {/* Overflow hatch overlay: covers the portion that exceeds dayLen */}
        {isOver && overflowAngle !== null && (()=>{
          // The overflow arc goes from overflowAngle back to -PI/2 (completing the circle)
          const overStart = overflowAngle;
          const overEnd = -Math.PI/2 + 2*Math.PI; // = 3PI/2
          const sw = ((overEnd - overStart) + 2*Math.PI) % (2*Math.PI);
          if (sw < 0.005) return null;
          const large = sw > Math.PI ? 1 : 0;
          const x1o=DONUT_CX+DONUT_R*Math.cos(overStart), y1o=DONUT_CY+DONUT_R*Math.sin(overStart);
          const x2o=DONUT_CX+DONUT_R*Math.cos(overEnd),   y2o=DONUT_CY+DONUT_R*Math.sin(overEnd);
          const x1i=DONUT_CX+DONUT_INNER*Math.cos(overEnd),   y1i=DONUT_CY+DONUT_INNER*Math.sin(overEnd);
          const x2i=DONUT_CX+DONUT_INNER*Math.cos(overStart), y2i=DONUT_CY+DONUT_INNER*Math.sin(overStart);
          const arcPath = `M ${x1o} ${y1o} A ${DONUT_R} ${DONUT_R} 0 ${large} 1 ${x2o} ${y2o} L ${x1i} ${y1i} A ${DONUT_INNER} ${DONUT_INNER} 0 ${large} 0 ${x2i} ${y2i} Z`;
          return (
            <g key="overflow-overlay" style={{pointerEvents:"none"}}>
              <path d={arcPath} fill={`url(#${patId})`} opacity={0.9}/>
              {/* Red boundary line at overflow start */}
              <line
                x1={DONUT_CX + DONUT_INNER*Math.cos(overflowAngle)}
                y1={DONUT_CY + DONUT_INNER*Math.sin(overflowAngle)}
                x2={DONUT_CX + DONUT_R*Math.cos(overflowAngle)}
                y2={DONUT_CY + DONUT_R*Math.sin(overflowAngle)}
                stroke="rgba(255,80,80,0.95)" strokeWidth={2} strokeDasharray="3,2"
              />
              {/* Small "OVER" label near the boundary */}
              {(()=>{
                const labelAngle = overflowAngle + sw/2;
                const lr = (DONUT_INNER + DONUT_R) / 2;
                return (
                  <text
                    x={DONUT_CX + lr*Math.cos(labelAngle)}
                    y={DONUT_CY + lr*Math.sin(labelAngle)+3}
                    textAnchor="middle" fill="rgba(255,100,100,0.95)"
                    fontSize={7} fontFamily={MONO} fontWeight="bold"
                    style={{pointerEvents:"none"}}
                  >OVER</text>
                );
              })()}
            </g>
          );
        })()}

        <circle cx={DONUT_CX} cy={DONUT_CY} r={DONUT_INNER} fill={T.bg} style={{pointerEvents:"none"}}/>
        <text x={DONUT_CX} y={DONUT_CY-7} textAnchor="middle" fill={isOver?"#ff6060":T.text} fontSize={12} fontFamily={MONO} fontWeight="bold" style={{pointerEvents:"none"}}>{formatHours(total)}</text>
        <text x={DONUT_CX} y={DONUT_CY+9} textAnchor="middle" fill={dragSeg!==null?"#FF6B2B":isOver?"#ff6060":T.textMuted} fontSize={8} fontFamily={MONO} style={{pointerEvents:"none",transition:"fill 0.2s"}}>{dragSeg!==null?"swap ↕":isOver?"over":"left"}</text>
      </svg>
    </div>
  );
}

// ── Linear slider ─────────────────────────────────────────────────────────────

function Slider({ value, max, color, step, locked, onChange }) {
  const trackRef=useRef(), fillRef=useRef(), thumbRef=useRef();
  const dragging=useRef(false), lastSnap=useRef(value), rafRef=useRef(null), tgtRaw=useRef(value), curRaw=useRef(value);

  const applyPct=p=>{ p=Math.max(0,Math.min(100,p)); if(fillRef.current)fillRef.current.style.width=p+"%"; if(thumbRef.current)thumbRef.current.style.left=p+"%"; };
  const animTo=t=>{ tgtRaw.current=t; if(rafRef.current)return;
    const run=()=>{ const d=tgtRaw.current-curRaw.current; if(Math.abs(d)<TOL_SLIDER){curRaw.current=tgtRaw.current;applyPct(curRaw.current/max*100);rafRef.current=null;return;} curRaw.current+=d*LERP_SLIDER;applyPct(curRaw.current/max*100);rafRef.current=requestAnimationFrame(run); };
    rafRef.current=requestAnimationFrame(run);
  };

  useEffect(()=>{animTo(value);},[value,max]);
  useEffect(()=>()=>{if(rafRef.current)cancelAnimationFrame(rafRef.current)},[]);

  const getRaw=cx=>{ const r=trackRef.current.getBoundingClientRect(); return Math.max(0,Math.min(1,(cx-r.left)/r.width))*max; };
  const getSnap=cx=>snapToStep(getRaw(cx),step);

  const onDown=e=>{ if(locked)return; e.preventDefault(); dragging.current=true; trackRef.current.setPointerCapture(e.pointerId); const r=getRaw(e.clientX); curRaw.current=r;tgtRaw.current=r;applyPct(r/max*100); const s=getSnap(e.clientX); onChange(s);lastSnap.current=s; };
  const onMove=e=>{ if(!dragging.current)return; animTo(getRaw(e.clientX)); const s=getSnap(e.clientX); if(s!==lastSnap.current){try{if(navigator.vibrate)navigator.vibrate(4)}catch{} lastSnap.current=s;} onChange(s); };
  const onUp=e=>{ if(!dragging.current)return; dragging.current=false; const s=getSnap(e.clientX); onChange(s);animTo(s); };

  const ip=(value/max)*100;
  return (
    <div ref={trackRef} onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} style={{position:"relative",height:36,borderRadius:8,cursor:locked?"not-allowed":"pointer",userSelect:"none",touchAction:locked?"pan-y":"none",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"var(--bg-slider)",borderRadius:8}}/>
      <div ref={fillRef} style={{position:"absolute",left:0,top:0,bottom:0,width:`${ip}%`,background:`linear-gradient(90deg,${color}55,${color}cc)`,borderRadius:8}}/>
      <div ref={thumbRef} style={{position:"absolute",left:`${ip}%`,top:"50%",transform:"translate(-50%,-50%)",width:22,height:28,background:locked?"#555":color,borderRadius:5,boxShadow:locked?"none":`0 2px 10px ${color}88`,pointerEvents:"none",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.2s"}}>
        {locked?<span style={{fontSize:9,color:"#fff",opacity:0.7}}>🔒</span>:<div style={{width:2,height:10,background:"rgba(0,0,0,0.25)",borderRadius:1}}/>}
      </div>
    </div>
  );
}

// ── Sync Modal ────────────────────────────────────────────────────────────────

function SyncModal({ T, dark, state, onImport, onClose }) {
  const [mode, setMode] = useState("export"); // "export" | "import"
  const [importStr, setImportStr] = useState("");
  const [importMode, setImportMode] = useState("full"); // "full" | "merge"
  const [copied, setCopied] = useState(false);
  const [importErr, setImportErr] = useState(null);
  const [importPreview, setImportPreview] = useState(null);
  const syncStr = encodeSyncString(state);
  const textareaRef = useRef();

  const handleCopy = () => {
    if (!syncStr) return;
    navigator.clipboard?.writeText(syncStr).then(()=>setCopied(true)).catch(()=>{
      if (textareaRef.current) { textareaRef.current.select(); document.execCommand("copy"); setCopied(true); }
    });
    setTimeout(()=>setCopied(false), 2000);
  };

  const handleImportStrChange = (val) => {
    setImportStr(val);
    setImportErr(null);
    setImportPreview(null);
    if (!val.trim()) return;
    const decoded = decodeSyncString(val);
    if (!decoded) { setImportErr("Invalid code — make sure it's complete."); return; }
    setImportPreview(decoded);
  };

  const handleImport = () => {
    if (!importPreview) return;
    onImport(importPreview, importMode);
    onClose();
  };

  const tabStyle = (active) => ({
    flex:1, padding:"9px 0", background:"none", border:"none",
    borderBottom: active ? "2px solid #FF6B2B" : `2px solid transparent`,
    color: active ? "#FF6B2B" : T.textMuted,
    fontFamily:MONO, fontSize:11, letterSpacing:1, cursor:"pointer",
    transition:"all 0.15s",
  });

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-sheet" style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:"16px 16px 0 0",padding:"0 0 16px"}}>
        {/* Header */}
        <div style={{padding:"20px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontFamily:BEBAS,fontSize:22,letterSpacing:2,color:T.text}}>SYNC / BACKUP</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:T.textMuted,fontSize:22,width:44,height:44,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",borderBottom:`1px solid ${T.border}`,marginBottom:20,padding:"0 4px"}}>
          <button style={tabStyle(mode==="export")} onClick={()=>setMode("export")}>⬆ EXPORT</button>
          <button style={tabStyle(mode==="import")} onClick={()=>setMode("import")}>⬇ IMPORT</button>
        </div>

        <div style={{padding:"0 20px"}}>

function Timeline({ tasks, T, dayLen, dayStart }) {
  let cursor=0;
  const segs=tasks.filter(t=>t.hours>0.02).map(t=>{const s=cursor;cursor+=t.hours;return{...t,start:s};});
  const ticks=[0,.25,.5,.75,1].map(f=>Math.round((dayStart+f*dayLen)*2)/2);
  return (
    <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 14px 10px",marginBottom:16}}>
      <div style={{position:"relative",height:36,borderRadius:6,overflow:"hidden",background:T.bgSlider,marginBottom:6}}>
        {segs.map(s=>{
          const left=(s.start/dayLen)*100, w=(s.hours/dayLen)*100;
          return <div key={s.id} style={{position:"absolute",left:`${left}%`,width:`${w}%`,top:0,bottom:0,background:s.done?"#444":s.color,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",minWidth:2,opacity:s.done?.45:1}}>{w>7&&<span style={{fontSize:9,color:"rgba(0,0,0,0.65)",fontFamily:MONO,whiteSpace:"nowrap",padding:"0 4px",fontWeight:"bold"}}>{s.name}</span>}</div>;
        })}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontFamily:MONO,fontSize:9,color:T.textFaint,paddingLeft:2,paddingRight:2}}>
        {ticks.map((h,i)=><span key={i}>{String(Math.floor(h)).padStart(2,"0")}:{h%1?"30":"00"}</span>)}
      </div>
    </div>
  );
}

function DayCard({ dayData, dayIdx, T, dark, step, todayTasks, isToday, onUpdate }) {
  const [expanded, setExpanded] = React.useState(false);
  const [newName, setNewName] = React.useState("");
  const total = weekTotalHours(dayData);
  const taskCount = dayData.tasks.length;
  const hasNote = dayData.note && dayData.note.trim().length > 0;

  const copyFromToday = () => {
    if (!todayTasks.length) return;
    const copied = todayTasks.map(t => ({...t, id: Date.now() + Math.random(), done: false}));
    onUpdate({ tasks: copied });
  };

  const addTask = () => {
    const name = newName.trim();
    if (!name) return;
    const color = PALETTE[dayData.tasks.length % PALETTE.length];
    const newTask = { id: Date.now() + Math.random(), name, hours: 1, originalHours: 1, color, locked: false, actual: 0, done: false };
    onUpdate({ tasks: [...dayData.tasks, newTask] });
    setNewName("");
  };

  const updateTaskHours = (taskId, hours) => {
    onUpdate({ tasks: dayData.tasks.map(t => t.id === taskId ? {...t, hours, originalHours: hours} : t) });
  };

  const deleteTask = (taskId) => {
    onUpdate({ tasks: dayData.tasks.filter(t => t.id !== taskId) });
  };

  const updateNote = (note) => onUpdate({ note });

  // Compact bar: colored segments proportional to hours
  const segments = dayData.tasks.filter(t => t.hours > 0);
  const segTotal = segments.reduce((s,t)=>s+t.hours,0);

  return (
    <div style={{
      background: T.bgCard,
      border: `1px solid ${isToday ? "#FF6B2B" : T.border}`,
      borderRadius: 12,
      overflow: "hidden",
      transition: "border-color 0.2s",
    }}>
      {/* Day header — always visible */}
      <button
        onClick={() => setExpanded(v => !v)}
        style={{
          width: "100%", background: "none", border: "none", padding: "11px 14px 9px",
          display: "flex", alignItems: "center", gap: 10, cursor: "pointer", textAlign: "left",
        }}
      >
        {/* Day name */}
        <div style={{flexShrink:0, minWidth:72}}>
          <div style={{fontFamily:BEBAS, fontSize:16, letterSpacing:1.5, color: isToday ? "#FF6B2B" : T.text, lineHeight:1}}>{DAYS_HU[dayIdx]}</div>
          {isToday && <div style={{fontFamily:MONO, fontSize:8, color:"#FF6B2B", letterSpacing:1, marginTop:1}}>MA</div>}
        </div>

        {/* Compact bar */}
        <div style={{flex:1, height:6, borderRadius:4, background:T.bgSlider, overflow:"hidden", position:"relative"}}>
          {segTotal > 0 ? segments.map((t,i) => {
            const left = segments.slice(0,i).reduce((s,x)=>s+x.hours,0) / segTotal * 100;
            const w = t.hours / segTotal * 100;
            return <div key={t.id} style={{position:"absolute",left:`${left}%`,width:`${w}%`,top:0,bottom:0,background:t.color}}/>;
          }) : null}
        </div>

        {/* Stats */}
        <div style={{fontFamily:MONO, fontSize:10, color: total > 0 ? T.textSub : T.textFaint, flexShrink:0, textAlign:"right", minWidth:52}}>
          {total > 0 ? <><span style={{color:"#FF6B2B",fontWeight:"bold"}}>{formatHours(total)}</span></> : <span style={{opacity:0.4}}>—</span>}
        </div>
        {taskCount > 0 && <div style={{fontFamily:MONO, fontSize:9, color:T.textFaint, flexShrink:0, minWidth:20, textAlign:"right"}}>{taskCount}✓</div>}
        {hasNote && <span style={{fontSize:10, flexShrink:0}}>📝</span>}
        <span style={{color:T.textFaint, fontSize:10, flexShrink:0}}>{expanded?"▲":"▼"}</span>
      </button>

      {/* Expanded content */}
      {expanded && (
        <div style={{borderTop:`1px solid ${T.border}`, padding:"12px 14px 14px", animation:"slideIn 0.15s ease"}}>

          {/* Tasks */}
          {dayData.tasks.length > 0 && (
            <div style={{marginBottom:12}}>
              {dayData.tasks.map(t => (
                <WeekTaskRow key={t.id} task={t} T={T} stepMinutes={step}
                  dayTotalHours={total}
                  onHoursChange={h => updateTaskHours(t.id, h)}
                  onDelete={() => deleteTask(t.id)}
                />
              ))}
            </div>
          )}

          {/* Add task row */}
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            <input
              value={newName}
              onChange={e=>setNewName(e.target.value)}

              style={{flex:1,background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 12px",color:T.text,fontFamily:MONO,fontSize:12,outline:"none"}}

            <button onClick={addTask} style={{background:"#FF6B2B",border:"none",borderRadius:8,padding:"8px 14px",color:"#000",fontFamily:BEBAS,fontSize:15,letterSpacing:1,flexShrink:0,minWidth:52,cursor:"pointer"}} onTouchStart={e=>e.currentTarget.style.opacity="0.75"} onTouchEnd={e=>e.currentTarget.style.opacity="1"}>ADD</button>

                ✕ törlés mind
              </button>
            )}
          </div>

          {/* Note */}
          <textarea
            value={dayData.note || ""}
            onChange={e => updateNote(e.target.value)}
            placeholder="Megjegyzés a naphoz…"
            rows={2}
            style={{width:"100%",background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 12px",color:T.text,fontFamily:MONO,fontSize:11,resize:"none",outline:"none",lineHeight:1.5,marginTop:8}}
            onFocus={e=>e.target.style.borderColor="#4ECDC4"}
            onBlur={e=>e.target.style.borderColor=T.border}
          />
        </div>
      )}
    </div>
  );
}

function WeekView({ T, dark, step, todayTasks }) {
  const [week, setWeek] = React.useState(initWeek);

  React.useEffect(() => { saveWeek(week); }, [week]);

  const updateDay = (dayIdx, patch) => {
    setWeek(prev => prev.map((d, i) => i === dayIdx ? {...d, ...patch} : d));
  };

  // "Today" = current day of week, Mon=0 … Sun=6 (Hungarian convention)
  const todayDowRaw = new Date().getDay(); // 0=Sun
  const todayDow = todayDowRaw === 0 ? 6 : todayDowRaw - 1; // convert to Mon=0

  const weekTotal = week.reduce((s, d) => s + weekTotalHours(d), 0);
  const filledDays = week.filter(d => d.tasks.length > 0).length;

  return (
    <div style={{padding:"0 16px", paddingBottom:100}}>
      {/* Week summary bar */}
      <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:12,padding:"12px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:12}}>
        <div>
          <div style={{fontFamily:BEBAS,fontSize:22,letterSpacing:2,color:"#FF6B2B",lineHeight:1}}>{formatHours(weekTotal)}</div>
          <div style={{fontFamily:MONO,fontSize:8,color:T.textFaint,letterSpacing:1}}>HETI ÖSSZESEN</div>
        </div>
        <div style={{flex:1, height:8, borderRadius:4, background:T.bgSlider, overflow:"hidden", display:"flex"}}>
          {week.map((d,i) => {
            const w = weekTotal > 0 ? (weekTotalHours(d) / weekTotal * 100) : (100/7);
            const col = d.tasks[0]?.color || T.bgSlider;
            return <div key={i} style={{width:`${w}%`,height:"100%",background:weekTotalHours(d)>0?col:T.bgSlider,borderRight:i<6?`1px solid ${T.bg}`:"none",opacity:weekTotalHours(d)>0?1:0.3,transition:"all 0.3s"}}/>;
          })}
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontFamily:MONO,fontSize:13,color:T.textSub,fontWeight:"bold"}}>{filledDays}<span style={{fontSize:9,color:T.textFaint,fontWeight:"normal"}}>/7</span></div>
          <div style={{fontFamily:MONO,fontSize:8,color:T.textFaint,letterSpacing:1}}>NAP TELI</div>
        </div>
      </div>

      {/* Day cards */}
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {week.map((dayData, dayIdx) => (
          <DayCard
            key={dayIdx}
            dayData={dayData}
            dayIdx={dayIdx}
            T={T}
            dark={dark}
            step={step}
            todayTasks={todayTasks}
            isToday={dayIdx === todayDow}
            onUpdate={patch => updateDay(dayIdx, patch)}
          />
        ))}
      </div>
    </div>
  );
}

function App() {
  const [state,dispatch]=useReducer(reducer,null,initState);
  const [newName,setNewName]=useState(""), [editTask,setEditTask]=useState(null), [toast,setToast]=useState(null);
  const [confirmRm,setConfirmRm]=useState(null), [confirmReset,setConfirmReset]=useState(false);
  const [showSettings,setShowSettings]=useState(false), [showFavs,setShowFavs]=useState(false);
  const [showSync,setShowSync]=useState(false);
  const [activeView,setActiveView]=useState("today");
  const [dragOver,setDragOver]=useState(null), [longDragIdx,setLongDragIdx]=useState(null), [dragPos,setDragPos]=useState({x:0,y:0});
  const [inputFocused,setInputFocused]=useState(false);
  const lpTimer=useRef(null), confirmRmTimer=useRef(null), taskListRef=useRef(), fileRef=useRef(), inputRef=useRef();

  const { tasks, favs, step, dark, showTL, dayStart, dayEnd } = state;
  const dl=calcDayLen(dayStart,dayEnd), T=dark?DARK:LIGHT;
  const total=tasks.reduce((s,t)=>s+t.hours,0), remaining=dl-total;
  const over=remaining<-TOL, perfect=Math.abs(remaining)<TOL;

  useEffect(()=>{saveState(state);},[state]);
  useEffect(()=>{
    document.documentElement.style.setProperty("--bg-slider",T.bgSlider);
    document.body.style.background=T.bg;
    document.getElementById("themeColorMeta").content=T.tc;
  },[dark]);

  const showToast=(msg,type="ok")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),TOAST_MS); };
  const setConfirmRmWithTimer=name=>{ clearTimeout(confirmRmTimer.current); setConfirmRm(name); if(name!==null)confirmRmTimer.current=setTimeout(()=>setConfirmRm(null),CONFIRM_MS); };

  const addTask=(nameArg,colorArg,hoursArg)=>{
    const name=(nameArg||newName).trim(); if(!name)return;
    if(tasks.some(t=>nameLc(t.name)===nameLc(name))){showToast("Task already exists","err");return;}
    dispatch({type:"ADD_TASK",name,color:colorArg,hours:hoursArg});
    recordUsage(name);
    setConfirmRmWithTimer(null); setNewName(""); inputRef.current?.blur();
  };

  const startLongDrag=(i,e)=>{
    const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
    clearTimeout(lpTimer.current);
    lpTimer.current=setTimeout(()=>{ try{if(navigator.vibrate)navigator.vibrate([12,40,12])}catch{} setLongDragIdx(i);setDragPos({x:cx,y:cy}); },LONG_PRESS_MS);
  };
  const cancelLongPress=()=>clearTimeout(lpTimer.current);

  useEffect(()=>{
    if(longDragIdx===null)return;
    document.body.style.overflow="hidden"; document.body.style.touchAction="none";
    const onMove=e=>{ if(e.cancelable)e.preventDefault(); const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY; setDragPos({x:cx,y:cy}); const els=taskListRef.current?.querySelectorAll("[data-taskcard]"); if(!els)return; let found=null; for(let i=0;i<els.length;i++){const r=els[i].getBoundingClientRect();if(cy>=r.top&&cy<=r.bottom){found=i;break;}} setDragOver(found!==null&&found!==longDragIdx?found:null); };
    const onUp=()=>{ if(dragOver!==null&&longDragIdx!==null&&dragOver!==longDragIdx)dispatch({type:"REORDER_TASKS",from:longDragIdx,to:dragOver}); setLongDragIdx(null);setDragOver(null); };
    window.addEventListener("pointermove",onMove,{passive:false}); window.addEventListener("pointerup",onUp);
    window.addEventListener("touchmove",onMove,{passive:false});   window.addEventListener("touchend",onUp);
    return ()=>{ document.body.style.overflow=""; document.body.style.touchAction=""; window.removeEventListener("pointermove",onMove); window.removeEventListener("pointerup",onUp); window.removeEventListener("touchmove",onMove); window.removeEventListener("touchend",onUp); };
  },[longDragIdx,dragOver]);

  const exportMD=()=>{ const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([serializeMD(tasks,dayStart,dayEnd)],{type:"text/markdown"})); a.download="sliders.md"; a.click(); showToast("Exported ✓"); };
  const handleFile=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{const{tasks:p,dayStart:ds,dayEnd:de}=parseMD(ev.target.result); if(!p.length){showToast("No tasks found","err");return;} dispatch({type:"SET_TASKS",tasks:p}); if(ds!==null&&de!==null&&de>ds)dispatch({type:"SET_DAY_WINDOW",start:ds,end:de}); showToast(`${p.length} tasks loaded`);}; r.readAsText(f); e.target.value=""; };

  const handleSyncImport = (data, mode) => {
    if (mode === "full") {
      dispatch({ type:"FULL_REPLACE", data });
      showToast("Full replace done ✓");
    } else {
      dispatch({ type:"MERGE_IMPORT", data });
      showToast("New items added ✓");
    }
  };

  const collapsibleBtn=(label,open,onClick,extra={})=>(
    <button onClick={onClick} style={{width:"100%",background:"none",border:`1px solid ${T.border}`,borderRadius:10,padding:"9px 14px",color:T.textMuted,fontFamily:MONO,fontSize:10,letterSpacing:1,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",...extra}}>
      <span>{label}</span><span style={{fontSize:11}}>{open?"▲":"▼"}</span>
    </button>
  );

  return (
    <div className="main-wrap" style={{minHeight:"100dvh",background:T.bg,color:T.text,fontFamily:MONO,maxWidth:520,margin:"0 auto",paddingBottom:100,transition:"background 0.25s,color 0.25s"}}>

      {/* HEADER */}
      <div className="sticky-header" style={{background:T.bg,transition:"background 0.25s"}}>
        <div style={{padding:"14px 16px 12px",borderBottom:`1px solid ${T.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"baseline",gap:8}}>
              <h1 style={{fontFamily:BEBAS,fontSize:36,letterSpacing:3,color:"#FF6B2B",lineHeight:1}}>SLIDERS</h1>
              <span style={{fontFamily:MONO,fontSize:8,color:T.textFaint,background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:4,padding:"2px 5px",letterSpacing:1}}>{step}m</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
              <div style={{textAlign:"left",width:96,flexShrink:0}}>
                <div style={{fontSize:26,fontFamily:BEBAS,letterSpacing:1,lineHeight:1,color:over?"#ff4444":perfect?"#4ECDC4":T.textSub,whiteSpace:"nowrap"}}>{perfect?`${formatHours(dl)} ✓`:formatHours(Math.abs(remaining))}</div>
                <div style={{fontSize:8,color:over?"#ff4444":T.textFaint,letterSpacing:1}}>{over?"OVER BY":perfect?"ALLOCATED":"REMAINING"}</div>
              </div>
              <button onClick={()=>dispatch({type:"SET_DARK",dark:!dark})} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:`1px solid ${T.border}`,borderRadius:20,padding:"6px 10px",minHeight:36,flexShrink:0,width:66}}>
                <span style={{fontSize:13}}>{dark?"☀️":"🌙"}</span>
                <div style={{width:28,height:16,borderRadius:8,background:dark?"#444":T.borderMid,position:"relative",transition:"background 0.2s",flexShrink:0}}>
                  <div style={{position:"absolute",top:2,left:dark?12:2,width:12,height:12,borderRadius:"50%",background:"#FF6B2B",transition:"left 0.2s",boxShadow:"0 1px 4px rgba(0,0,0,0.4)"}}/>
                </div>
              </button>
            </div>
          </div>
        </div>
        <div style={{height:2,background:T.bgSlider,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${Math.min(100,(total/dl)*100)}%`,background:over?"#ff4444":perfect?"#4ECDC4":"#FF6B2B",transition:"width 0.2s,background 0.2s",borderRadius:"0 2px 2px 0"}}/>
        </div>
        {/* Tab bar */}
        <div style={{display:"flex",borderBottom:`1px solid ${T.border}`}}>
          {[["today","⬡ TODAY"],["week","▦ WEEK"]].map(([v,label])=>(
            <button key={v} onClick={()=>setActiveView(v)} style={{flex:1,background:"none",border:"none",borderBottom:`2px solid ${activeView===v?"#FF6B2B":"transparent"}`,padding:"9px 0 7px",color:activeView===v?"#FF6B2B":T.textFaint,fontFamily:MONO,fontSize:10,letterSpacing:1.5,cursor:"pointer",transition:"color 0.15s,border-color 0.15s"}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:"0 16px"}}>

        {activeView==="week" ? null : (<React.Fragment>

        {/* DONUT + RING */}
        <div style={{margin:"12px 0",padding:"16px 16px 12px",background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:14}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{position:"relative",width:220,height:220,flexShrink:0,margin:"14px 16px"}}>
              <CircularDaySlider dayStart={dayStart} dayEnd={dayEnd} T={T} onChange={(s,e)=>dispatch({type:"SET_DAY_WINDOW",start:s,end:e})}/>
              <Donut tasks={tasks} T={T} dayLen={dl} onReorder={(f,t)=>dispatch({type:"REORDER_TASKS",from:f,to:t})}/>
            </div>
            <div style={{flex:1,overflow:"hidden",minWidth:0,display:"flex",flexDirection:"column",gap:0}}>
              {tasks.map(t=>{
                const pct=dl>0?Math.max(2,(t.hours/dl)*100):0, c=t.done?"#555":t.color;
                return (
                  <div key={t.id} style={{marginBottom:7,opacity:t.done?.4:1,transition:"opacity 0.2s"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                      <span style={{fontSize:10,color:t.done?T.textFaint:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textDecoration:t.done?"line-through":"none",maxWidth:"65%",fontFamily:MONO}}>{t.name}</span>
                      <span style={{fontSize:9,color:c,flexShrink:0,fontFamily:MONO,opacity:0.9}}>{formatHours(t.hours)}</span>
                    </div>
                    <div style={{height:4,borderRadius:3,background:T.bgSlider,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${pct}%`,borderRadius:3,background:c,boxShadow:t.done?"none":`0 0 6px ${c}66`,transition:"width 0.3s"}}/>
                    </div>
                  </div>
                );
              })}
              {tasks.length===0&&<span style={{fontSize:10,color:T.textFaint}}>No tasks yet</span>}
              <button onClick={()=>{ const now=new Date(), m=now.getHours()*60+now.getMinutes(); dispatch({type:"SET_DAY_START",start:Math.min(Math.ceil(m/step)*step/60,23.5)}); showToast("Start → now ✓"); }}
                style={{marginTop:6,background:"none",border:`1px solid ${T.borderMid}`,borderRadius:8,padding:"7px 10px",color:T.textMuted,fontFamily:MONO,fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",gap:5,transition:"all 0.15s",letterSpacing:0.5}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor="#4ECDC4";e.currentTarget.style.color="#4ECDC4";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=T.borderMid;e.currentTarget.style.color=T.textMuted;}}
                onTouchStart={e=>{e.currentTarget.style.borderColor="#4ECDC4";e.currentTarget.style.color="#4ECDC4";}}
                onTouchEnd={e=>{e.currentTarget.style.borderColor=T.borderMid;e.currentTarget.style.color=T.textMuted;}}
              ><span>⏱</span> start now</button>
            </div>
          </div>
        </div>

        {showTL&&<Timeline tasks={tasks} T={T} dayLen={dl} dayStart={dayStart}/>}

        {/* SETTINGS + SYNC row */}
        <div style={{marginBottom:10}}>
          <div style={{display:"flex",gap:6,marginBottom:6}}>
            <button onClick={()=>setShowSettings(v=>!v)} style={{flex:1,background:"none",border:`1px solid ${T.border}`,borderRadius:10,padding:"9px 14px",color:showSettings?"#FF6B2B":T.textMuted,fontFamily:MONO,fontSize:10,letterSpacing:1,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",transition:"color 0.15s,border-color 0.15s",borderColor:showSettings?"#FF6B2B":T.border}}>
              <span>⚙ SETTINGS</span><span style={{fontSize:11}}>{showSettings?"▲":"▼"}</span>
            </button>
            <button onClick={()=>setShowSync(true)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:10,padding:"9px 14px",color:T.textMuted,fontFamily:MONO,fontSize:10,letterSpacing:1,display:"flex",alignItems:"center",gap:6,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#FF6B2B";e.currentTarget.style.color="#FF6B2B";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.textMuted;}}>
              🔗 SYNC
            </button>
          </div>
          {showSettings&&(
            <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 16px",animation:"slideIn 0.15s ease"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${T.border}`,marginBottom:12}}>
                <span style={{fontFamily:MONO,fontSize:11,color:T.textSub}}>Timeline view</span>
                <button onClick={()=>dispatch({type:"SET_SHOW_TL",v:!showTL})} style={{width:44,height:24,borderRadius:12,background:showTL?"#FF6B2B":"#484850",border:"none",position:"relative",cursor:"pointer",transition:"background 0.2s",flexShrink:0}}>
                  <div style={{position:"absolute",top:3,left:showTL?22:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.2s",boxShadow:"0 1px 4px rgba(0,0,0,0.3)"}}/>
                </button>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:9,color:T.textDim,letterSpacing:1.5,marginBottom:8,fontFamily:MONO}}>SNAP SIZE</div>
                <div style={{display:"flex",gap:6}}>
                  {STEPS.map(s=><button key={s.m} onClick={()=>dispatch({type:"SET_STEP",step:s.m})} style={{flex:1,background:s.m===step?"#FF6B2B":T.bgInput,border:`1px solid ${s.m===step?"#FF6B2B":T.border}`,borderRadius:8,padding:"8px 0",color:s.m===step?"#000":T.textMuted,fontFamily:MONO,fontSize:11,fontWeight:s.m===step?"bold":"normal",transition:"all 0.15s"}}>{s.l}</button>)}
                </div>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:9,color:T.textDim,letterSpacing:1.5,marginBottom:8,fontFamily:MONO}}>FILE</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[["⬇ EXPORT .MD",exportMD],["⬆ IMPORT .MD",()=>fileRef.current.click()]].map(([label,onClick])=>(
                    <button key={label} onClick={onClick} style={{background:dark?"#0e0e10":"#d0cec8",border:`1px solid ${dark?"#505055":"#a8a6a0"}`,borderRadius:10,padding:"12px 10px",minHeight:48,color:dark?"#cccccc":"#2a2a2a",fontFamily:MONO,fontSize:10,letterSpacing:0.5,width:"100%",transition:"opacity 0.1s"}} onTouchStart={e=>e.currentTarget.style.opacity="0.7"} onTouchEnd={e=>e.currentTarget.style.opacity="1"}>{label}</button>
                  ))}
                </div>
              </div>
              <input ref={fileRef} type="file" accept=".md" style={{display:"none"}} onChange={handleFile}/>
              <div>
                <div style={{fontSize:9,color:T.textDim,letterSpacing:1.5,marginBottom:8,fontFamily:MONO}}>DANGER</div>
                {!confirmReset?(
                  <button onClick={()=>setConfirmReset(true)} style={{width:"100%",background:"none",border:"1px solid #cc3333",borderRadius:10,padding:"10px",color:"#cc3333",fontFamily:MONO,fontSize:10,letterSpacing:1,cursor:"pointer"}}>⚠ RESET APP</button>
                ):(
                  <div style={{background:"#1a0000",border:"1px solid #ff2222",borderRadius:10,padding:"14px",animation:"slideIn 0.15s ease"}}>
                    <div style={{fontFamily:MONO,fontSize:11,color:"#ff4444",marginBottom:12,lineHeight:1.6}}>Reset everything?<br/><span style={{fontSize:9,color:"#cc4444",opacity:0.8}}>Tasks, favourites and settings will be wiped.</span></div>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>{localStorage.removeItem(STORAGE_KEY);window.location.reload();}} style={{flex:1,background:"#cc0000",border:"none",borderRadius:8,padding:"10px",color:"#fff",fontFamily:MONO,fontSize:11,fontWeight:"bold",minHeight:44}}>YES</button>
                      <button onClick={()=>setConfirmReset(false)} style={{flex:1,background:"none",border:`1px solid ${dark?"#505055":"#a8a6a0"}`,borderRadius:8,padding:"10px",color:T.textMuted,fontFamily:MONO,fontSize:11,minHeight:44}}>CANCEL</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>



        {/* FAVOURITES */}
        <div style={{marginBottom:12}}>
          {collapsibleBtn(`★ FAVOURITES${favs.length>0?` (${favs.length})`:""}`,showFavs,()=>setShowFavs(v=>!v),{marginBottom:showFavs?8:0,transition:"margin 0.15s"})}
          {showFavs&&(
            <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",animation:"slideIn 0.15s ease"}}>
              {favs.length===0&&<div style={{textAlign:"center",padding:"16px 0",fontFamily:MONO,fontSize:11,color:T.textFaint,letterSpacing:1}}>NO FAVOURITES YET — STAR A TASK</div>}
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                {favs.map(f=>{
                  const active=tasks.some(t=>nameLc(t.name)===nameLc(f.name)), pending=confirmRm===f.name;
                  const dn=pending?"tap to cancel":(f.name.length>14?f.name.slice(0,14)+"…":f.name);
                  return (
                    <div key={f.name} style={{display:"flex",alignItems:"center",borderRadius:10,overflow:"hidden",border:`1px solid ${pending?"#ff5555":active?f.color:T.border}`,opacity:active?.45:1,transition:"all 0.15s"}}>
                      <button onClick={()=>{if(pending){setConfirmRmWithTimer(null);return;}if(!active)addTask(f.name,f.color,f.hours);}} style={{background:pending?"#3a0a0a":active?T.bgCard:`${f.color}22`,border:"none",padding:"8px 12px",display:"flex",alignItems:"center",gap:7,cursor:active&&!pending?"default":"pointer",minHeight:40}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:pending?"#ff5555":f.color,flexShrink:0}}/>
                        <span style={{fontFamily:MONO,fontSize:11,color:pending?"#ff7777":active?T.textFaint:T.text,whiteSpace:"nowrap"}}>{dn}</span>
                        {!pending&&<span style={{fontFamily:MONO,fontSize:10,color:f.color,opacity:0.8}}>{formatHours(f.hours)}</span>}
                      </button>
                      <button onClick={()=>pending?(dispatch({type:"DEL_FAV",name:f.name}),setConfirmRmWithTimer(null)):setConfirmRmWithTimer(f.name)} style={{background:pending?"#ff444430":"none",border:"none",borderLeft:`1px solid ${pending?"#ff5555":T.border}`,padding:"8px 10px",color:pending?"#ff5555":T.textDim,fontSize:11,cursor:"pointer",minHeight:40,display:"flex",alignItems:"center",fontFamily:MONO,transition:"all 0.15s"}} onMouseEnter={e=>{if(!pending)e.currentTarget.style.color="#ff5555";}} onMouseLeave={e=>{if(!pending)e.currentTarget.style.color=T.textDim;}}>{pending?"remove":"✕"}</button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        {/* TASKS */}
        <div style={{marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontSize:10,color:T.textDim,letterSpacing:2,fontFamily:MONO}}>TASKS</div>
            {tasks.length>1&&<button onClick={()=>{dispatch({type:"DISTRIBUTE"});showToast("Distributed ✓");}} style={{background:"none",border:`1px solid ${T.borderMid}`,borderRadius:7,padding:"4px 10px",color:T.textMuted,fontFamily:MONO,fontSize:9,cursor:"pointer",letterSpacing:0.5,transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#4ECDC4";e.currentTarget.style.color="#4ECDC4";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.borderMid;e.currentTarget.style.color=T.textMuted;}}>⇄ distribute</button>}
          </div>
          {tasks.length===0&&(
            <div style={{textAlign:"center",padding:"28px 0 20px",borderRadius:12,border:`1px dashed ${T.border}`}}>
              <div style={{fontSize:24,marginBottom:8}}>📋</div>
              <div style={{fontSize:11,color:T.textFaint,letterSpacing:1}}>No tasks yet</div>
              <div style={{fontSize:10,color:T.textFaint,opacity:0.6,marginTop:4}}>Add one below ↓</div>
            </div>
          )}
          <div ref={taskListRef} style={{opacity:longDragIdx!==null?.92:1,transition:"opacity 0.2s"}}>
            {tasks.map((t,i)=>{
              const isFloat=longDragIdx===i, isOver=dragOver===i;
              return (
                <div key={t.id} data-taskcard={i} style={{opacity:isFloat?.25:1,transform:isOver?"translateY(-3px) scale(1.01)":isFloat?"scale(0.97)":"none",transition:"opacity 0.2s,transform 0.15s",filter:isOver?`drop-shadow(0 4px 12px ${t.color}55)`:"none",borderRadius:12}}>
                  <TaskCard task={t} stepMinutes={step} dayLen={dl} tasks={tasks} T={T}
                    onChange={p=>dispatch({type:"UPD_TASK",id:t.id,patch:p})}
                    onDelete={()=>dispatch({type:"DEL_TASK",id:t.id})}
                    onEdit={()=>setEditTask({...t})}
                    onLock={()=>dispatch({type:"UPD_TASK",id:t.id,patch:{locked:!t.locked}})}
                    isFav={favs.some(f=>nameLc(f.name)===nameLc(t.name))}
                    onFav={()=>dispatch({type:favs.some(f=>nameLc(f.name)===nameLc(t.name))?"DEL_FAV":"ADD_FAV",name:t.name,task:t})}
                    onLongPressStart={e=>startLongDrag(i,e)} onLongPressEnd={cancelLongPress}
                  />
                </div>
              );
            })}
          </div>
        </div>

        {longDragIdx!==null&&tasks[longDragIdx]&&(()=>{const t=tasks[longDragIdx];return(
          <div style={{position:"fixed",left:dragPos.x-140,top:dragPos.y-28,width:280,zIndex:300,pointerEvents:"none",animation:"floatIn 0.15s ease",filter:`drop-shadow(0 8px 24px ${t.color}66)`}}>
            <div style={{background:T.bgCard,border:`2px solid ${t.color}`,borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:8,transform:"rotate(-1.5deg) scale(1.04)"}}>
              <div style={{width:12,height:12,borderRadius:"50%",background:t.color,boxShadow:`0 0 8px ${t.color}`}}/>
              <span style={{fontFamily:MONO,fontSize:12,color:T.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</span>
              <span style={{fontFamily:MONO,fontSize:11,color:t.color,fontWeight:"bold"}}>{formatHours(t.hours)}</span>
            </div>
          </div>
        );})()}

        {/* ADD TASK */}
        {(()=>{
          const topUsed = getTopUsed(3);
          const suggestions = topUsed.filter(name => !tasks.some(t=>nameLc(t.name)===name));
          return (
            <div style={{position:"relative",display:"flex",gap:8,marginBottom:24}}>
              {inputFocused && suggestions.length > 0 && (
                <div style={{position:"absolute",bottom:"calc(100% + 8px)",left:0,right:0,zIndex:50,display:"flex",gap:6,padding:"8px 10px",background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:10,boxShadow:`0 -4px 20px rgba(0,0,0,0.35)`,animation:"slideIn 0.15s ease",pointerEvents:"auto"}}>
                  {suggestions.map(name=>{
                    const fav=favs.find(f=>nameLc(f.name)===name);
                    const color=fav?.color||PALETTE[0];
                    return (
                      <button key={name} onMouseDown={e=>{e.preventDefault(); addTask(name,fav?.color,fav?.hours);}} style={{flex:1,background:`${color}18`,border:`1px solid ${color}44`,borderRadius:8,padding:"7px 8px",display:"flex",alignItems:"center",gap:6,cursor:"pointer",transition:"all 0.15s",minWidth:0,overflow:"hidden"}} onMouseEnter={e=>{e.currentTarget.style.background=`${color}30`;e.currentTarget.style.borderColor=`${color}88`;}} onMouseLeave={e=>{e.currentTarget.style.background=`${color}18`;e.currentTarget.style.borderColor=`${color}44`;}}>
                        <div style={{width:7,height:7,borderRadius:"50%",background:color,flexShrink:0}}/>
                        <span style={{fontFamily:MONO,fontSize:10,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name.length>12?name.slice(0,12)+"…":name}</span>
                      </button>
                    );
                  })}
                </div>
              )}
              <input ref={inputRef} value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()} placeholder="Add a task…" style={{flex:1,background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:10,padding:"13px 16px",color:T.text,fontFamily:MONO,fontSize:14,transition:"border-color 0.2s"}} onFocus={e=>{e.target.style.borderColor="#FF6B2B";setInputFocused(true);}} onBlur={e=>{e.target.style.borderColor=T.border;setTimeout(()=>setInputFocused(false),150);}}/>
              <button onClick={()=>addTask()} style={{background:"#FF6B2B",border:"none",borderRadius:10,padding:"13px 18px",color:"#000",fontFamily:BEBAS,fontSize:18,letterSpacing:1,flexShrink:0,minWidth:70,minHeight:52,transition:"opacity 0.1s"}} onTouchStart={e=>e.currentTarget.style.opacity="0.75"} onTouchEnd={e=>e.currentTarget.style.opacity="1"} onMouseEnter={e=>e.currentTarget.style.opacity="0.85"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>ADD</button>
            </div>
          );
        })()}
      </React.Fragment>)}
      </div>

      {activeView==="week" && (
        <WeekView T={T} dark={dark} step={step} todayTasks={tasks}/>
      )}

      {editTask&&<EditModal task={editTask} T={T} onSave={p=>{dispatch({type:"UPD_TASK",id:editTask.id,patch:p});setEditTask(null);showToast("Task updated ✓");}} onClose={()=>setEditTask(null)}/>}
      {showSync&&<SyncModal T={T} dark={dark} state={state} onImport={handleSyncImport} onClose={()=>setShowSync(false)}/>}
      {toast&&<div style={{position:"fixed",bottom:"calc(20px + env(safe-area-inset-bottom,0px))",left:"50%",transform:"translateX(-50%)",zIndex:200,background:toast.type==="err"?"#ff444422":"#FF6B2B22",border:`1px solid ${toast.type==="err"?"#ff4444":"#FF6B2B"}`,borderRadius:24,padding:"12px 22px",fontFamily:MONO,fontSize:12,color:toast.type==="err"?"#ff7777":"#FF6B2B",animation:"toastIn 0.2s ease",whiteSpace:"nowrap",backdropFilter:"blur(8px)"}}>{toast.msg}</div>}
    </div>
  );
}

migrateOldData();
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
