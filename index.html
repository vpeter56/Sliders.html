<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1c1c1e" id="themeColorMeta"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Sliders</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="stylesheet" href="styles.css"/>
</head>
<body style="background:#1c1c1e">
<div id="root"></div>

<!-- Load order: constants → helpers → store → components → app → boot -->
<script type="text/babel" src="constants.js"   data-type="module"></script>
<script type="text/babel" src="helpers.js"      data-type="module"></script>
<script type="text/babel" src="store.js"        data-type="module"></script>
<script type="text/babel" src="components/CircularDaySlider.js" data-type="module"></script>
<script type="text/babel" src="components/Donut.js"             data-type="module"></script>
<script type="text/babel" src="components/components.js"        data-type="module"></script>
<script type="text/babel" src="App.js"          data-type="module"></script>

<script type="text/babel">
// ── Bootstrap ─────────────────────────────────────────────────────────────────
// Expose shared helpers on window so each file can access them without a
// bundler. In a real build pipeline (Vite / webpack) these would be ES module
// imports instead.
import { PALETTE, STEPS, DARK, LIGHT, STORAGE_KEY }       from "./constants.js";
import { formatHours, saveState, parseMD, serializeMD,
         adjustColor, migrateOldData }                     from "./helpers.js";
import { initState, reducer }                              from "./store.js";
import { CircularDaySlider }                               from "./components/CircularDaySlider.js";
import { Donut }                                           from "./components/Donut.js";
import { Slider, Btn44, TaskCard, EditModal,
         Timeline, ThemeToggle, FileBtn }                  from "./components/components.js";
import { App }                                             from "./App.js";

// Make everything available globally (replaces the old single-file globals)
Object.assign(window, {
  PALETTE, STEPS, DARK, LIGHT, STORAGE_KEY,
  formatHours, saveState, parseMD, serializeMD, adjustColor,
  initState, reducer,
  CircularDaySlider, Donut,
  Slider, Btn44, TaskCard, EditModal, Timeline, ThemeToggle, FileBtn,
});

migrateOldData();

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
